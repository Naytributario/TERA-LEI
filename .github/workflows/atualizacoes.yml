name: TERA — Atualizar Fontes

on:
  schedule:
    # Executa de segunda a sexta às 09:00 BRT (12:00 UTC)
    - cron: '0 12 * * 1-5'
  workflow_dispatch:
    # Permite execução manual pelo botão no GitHub

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar dependências
        run: |
          pip install requests beautifulsoup4
      
      - name: Executar script de atualização
        run: |
          python atualizar_fontes.py
      
      - name: Commit e push das atualizações
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "TERA Bot"
          git add data/atualizacoes.json
          # Só faz commit se houver alterações
          git diff --cached --quiet || git commit -m "📰 Atualização automática $(date +'%d/%m/%Y %H:%M') BRT"
          git push
