*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Segoe UI','Helvetica Neue',sans-serif;color:var(--text);transition:background .3s,color .3s}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .2s ease-out}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-track{background:var(--bg)}
.nb{background:none;border:none;color:var(--text-sec);padding:9px 13px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:13px;border-radius:7px;transition:all .15s;font-family:inherit;white-space:nowrap}
.nb:hover{color:var(--text);background:var(--bg-hover)}
.nb.on{color:var(--gold);background:var(--gold-subtle);font-weight:600}
.tg{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;font-family:'Segoe UI',sans-serif}
.cd{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;transition:border-color .15s,box-shadow .15s;box-shadow:var(--shadow)}
.cd:hover{border-color:var(--gold)}
.stab{background:none;border:none;padding:8px 14px;cursor:pointer;font-size:12px;font-family:inherit;color:var(--text-sec);border-bottom:2px solid transparent;transition:all .15s}
.stab:hover{color:var(--text)}
.stab.on{color:var(--gold);border-bottom-color:var(--gold);font-weight:600}
input,select,textarea{font-family:inherit;color:var(--text);background:var(--input-bg);border:1px solid var(--border)}
select{color:var(--text)}
table.dt{width:100%;border-collapse:collapse;font-size:13px}
table.dt th{background:var(--grad);color:#0c0e12;padding:8px 10px;text-align:left;font-weight:600;position:sticky;top:0}
table.dt td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text)}
table.dt tr:hover{background:var(--bg-hover)}
.badge{display:inline-block;padding:1px 7px;border-radius:3px;font-size:10px;font-weight:600;font-family:inherit}
.badge-revogado{background:rgba(231,76,60,0.15);color:#e74c3c}
.badge-vigente{background:rgba(46,204,113,0.15);color:#2ecc71}
.btn-primary{background:var(--grad);color:#0c0e12;border:none;border-radius:8px;padding:10px 18px;font-weight:600;cursor:pointer;font-size:14px;transition:opacity .15s}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{background:transparent;border:1px dashed var(--border);border-radius:8px;padding:10px 18px;color:var(--text-sec);cursor:pointer;font-size:14px;transition:all .15s}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold)}
.theme-toggle{background:none;border:1px solid var(--border);border-radius:8px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--text-sec)}
.theme-toggle:hover{border-color:var(--gold);color:var(--gold)}
a{color:var(--gold)}

// Parser
const PATS=[{t:"TÍTULO",r:/^\s*T[ÍI]TULO\s+(?:[IVXLCDM]+|ÚNICO)\s*$/i},{t:"CAPÍTULO",r:/^\s*CAP[ÍI]TULO\s+(?:[IVXLCDM]+|ÚNICO)\s*$/i},{t:"SEÇÃO",r:/^\s*SE[ÇC][ÃA]O\s+(?:[IVXLCDM]+|ÚNICA)\s*$/i},{t:"SUBSEÇÃO",r:/^\s*SUBSE[ÇC][ÃA]O\s+(?:[IVXLCDM]+|ÚNICA)\s*$/i},{t:"ARTIGO",r:/^\s*Art\.\s*\d+[ºo°]?[\s\-\.]+/},{t:"PARÁGRAFO",r:/^\s*(?:§\s*\d+[ºo°]?\.?\s|Par[áa]grafo\s+[úu]nico\.?\s)/i},{t:"INCISO",r:/^\s*[IVXLCDM]+\s*[\-–—]\s+/},{t:"ALÍNEA",r:/^\s*[a-z]\)\s+/},{t:"ITEM",r:/^\s*\d+\.\s+/}];

function idT(s){for(const p of PATS)if(p.r.test(s.trim()))return p.t;return null;}
function exId(t,s){s=s.trim();if(DIV.has(t))return s;const R={ARTIGO:/^(Art\.\s*\d+[ºo°]?[\-\.]?)/,PARÁGRAFO:/^(§\s*\d+[ºo°]?\.?|Par[áa]grafo\s+[úu]nico\.?)/i,INCISO:/^([IVXLCDM]+)\s*[\-–—]/,ALÍNEA:/^([a-z]\))/,ITEM:/^(\d+\.)/};const m=R[t]?.exec(s);return m?m[1].trim():s.slice(0,30);}
function exTx(t,s){s=s.trim();if(DIV.has(t))return"";const R={ARTIGO:/^Art\.\s*\d+[ºo°]?[\s\-\.]+(.+)/,PARÁGRAFO:/^(?:§\s*\d+[ºo°]?\.?\s+|Par[áa]grafo\s+[úu]nico\.?\s+)(.+)/i,INCISO:/^[IVXLCDM]+\s*[\-–—]\s+(.+)/,ALÍNEA:/^[a-z]\)\s+(.+)/,ITEM:/^\d+\.\s+(.+)/};const m=R[t]?.exec(s);return m?m[1].trim():s;}
function parse(txt){const ds=[];let a=null,ag=false;for(const l of txt.split("\n")){const s=l.trim();if(!s){if(ag&&a)ag=false;continue;}const t=idT(s);if(t){a={tipo:t,id:exId(t,s),rub:"",txt:exTx(t,s)};ds.push(a);ag=DIV.has(t);}else if(a){if(ag&&!a.rub){a.rub=s;ag=false;}else a.txt=a.txt?a.txt+" "+s:s;}}return ds;}

// Analysis functions (matching Python)
function extrairRemissoes(ds){const re=/(?:§\s*\d+[ºo°]?\s+d[oe]\s+)?(?:arts?\.\s*)(\d+[ºo°]?(?:\s*(?:,|e|a)\s*\d+[ºo°]?)*)/gi;const res=[];let art="";
  for(const d of ds){if(d.tipo==="ARTIGO")art=d.id;const full=d.txt+" "+d.rub;let m;re.lastIndex=0;while((m=re.exec(full))!==null){const refs=m[1].match(/\d+[ºo°]?/g)||[];for(const r of refs){const dest="Art. "+r;if(dest!==art&&art)res.push({origem:art,disp:d.id,destino:dest,ctx:full.trim(),tipo:d.tipo});}}}return res;}

function extrairPrazosValores(ds){const reVal=/R\$\s*[\d\.]+,\d{2}/g;const rePct=/\d+(?:[,\.]\d+)?\s*%/g;const rePrazo=/(?:\d+\s*(?:dias?|meses?|anos?|horas?))|(?:at[ée]\s+\d{1,2}\s+de\s+\w+)/gi;

function buildIdx(ds,area){const ws=AREAS[area]?.palavras||[];const idx={};let art="";for(const d of ds){if(d.tipo==="ARTIGO")art=d.id;const t=(d.txt+" "+d.rub).toLowerCase();for(const w of ws)if(t.includes(w.toLowerCase())&&art){if(!idx[w])idx[w]=[];if(!idx[w].includes(art))idx[w].push(art);}}return Object.fromEntries(Object.entries(idx).sort((a,b)=>a[0].localeCompare(b[0],"pt")));}

function hierarquia(ds){const ctx={};const trilha={TÍTULO:"",CAPÍTULO:"",SEÇÃO:"",SUBSEÇÃO:""};const niv=["TÍTULO","CAPÍTULO","SEÇÃO","SUBSEÇÃO"];

async function pdfToText(f){try{const ab=await f.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:ab}).promise;let fullText="";

// ═══ ERROR BOUNDARY ═══
class ErrorBoundary extends React.Component{constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(error){return{hasError:true,error};}
  componentDidCatch(error,errorInfo){console.error("Erro capturado:",error,errorInfo);}
  render(){if(this.state.hasError){return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)",padding:20}}><div style={{maxWidth:500,textAlign:"center"}}><div style={{fontSize:32,marginBottom:16}}>⚠️</div><h1 style={{fontSize:24,fontWeight:700,marginBottom:12,color:"var(--text)"}}>Erro na Renderização</h1><p style={{fontSize:14,color:"var(--text-sec)",marginBottom:16,lineHeight:1.6}}>Ocorreu um erro ao carregar a aplicação. Por favor, recarregue a página.</p><details style={{marginTop:16,padding:12,background:"var(--bg-hover)",borderRadius:8,textAlign:"left",fontSize:12}}><summary style={{cursor:"pointer",fontWeight:600,marginBottom:8}}>Detalhes do Erro</summary><pre style={{overflow:"auto",padding:8,background:"var(--bg-card)",borderRadius:4,fontSize:11}}>{this.state.error?.toString()}</pre></details><button onClick={()=>window.location.reload()} style={{marginTop:16,padding:"10px 20px",background:"var(--grad)",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:14,fontWeight:600}}>Recarregar Página</button></div></div>;}return this.props.children;}}

function TabIndice({ds,area,onGoToArt}){const idx=useMemo(()=>buildIdx(ds,area),[ds,area]);return <div><div style={{marginBottom:12}}><input placeholder="Buscar palavra-chave..." style={{width:"100%",maxWidth:"100%",background:"var(--bg-hover)",border:"1px solid var(--border)",borderRadius:6,padding:"10px 14px",fontSize:14,boxSizing:"border-box"}}/></div><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8}}>{Object.entries(idx).map(([palavra,artigos])=><div key={palavra} className="cd" style={{padding:12,cursor:"pointer"}} onClick={()=>onGoToArt(artigos[0])}><div style={{fontWeight:600,fontSize:13,marginBottom:4}}>{palavra}</div><div style={{fontSize:11,color:"var(--text-sec)"}}>{artigos.length} artigo(s): {artigos.slice(0,3).join(", ")}{artigos.length>3?"...":""}</div></div>)}</div></div>;}

function TabMapa({ds}){const estrutura=useMemo(()=>{const mapa={};let secaoAtual="";for(const d of ds){if(d.tipo==="SEÇÃO"){secaoAtual=d.id;mapa[secaoAtual]={titulo:d.rub,artigos:[]};}else if(d.tipo==="ARTIGO"&&secaoAtual){mapa[secaoAtual].artigos.push(d.id);}}return mapa;},[ds]);return <div style={{display:"flex",flexDirection:"column",gap:12}}>{Object.entries(estrutura).map(([secao,dados])=><div key={secao} className="cd" style={{padding:14}}><div style={{fontWeight:600,fontSize:13,marginBottom:8,color:"var(--gold)"}}>{secao}</div><div style={{fontSize:12,color:"var(--text-sec)",marginBottom:6}}>{dados.titulo}</div><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{dados.artigos.map(art=><span key={art} style={{background:"var(--gold-subtle)",color:"var(--gold)",padding:"2px 8px",borderRadius:4,fontSize:11}}>{art}</span>)}</div></div>)}</div>;}

// ═══ APP ═══
function App(){
  const [theme,setTheme]=useState(()=>{try{return localStorage.getItem("t3-theme")||"dark"}catch{return"dark"}});
  useEffect(()=>{document.body.setAttribute("data-theme",theme);try{localStorage.setItem("t3-theme",theme)}catch{}},[theme]);
  const toggleTheme=()=>setTheme(t=>t==="dark"?"light":"dark");
  const [lib,setLib]=useState(()=>LS("t3-lib")||[]);const [sel,setSel]=useState(null);const [vw,setVw]=useState("library");const [uping,setUp]=useState(false);const [area,setArea]=useState("tributario");const [study,setStudy]=useState(()=>LS("t3-st")||{});const [apiKey,setApiKey]=useState(()=>LS("t3-key")||"");const fRef=useRef(null);

  const upF=async e=>{const f=e.target.files?.[0];if(!f)return;setUp(true);try{const t=await pdfToText(f);const ds=parse(t);const l={id:Date.now()+"",nome:f.name.replace(/\.pdf$/i,""),data:new Date().toLocaleDateString("pt-BR"),ds,nA:ds.filter(d=>d.tipo==="ARTIGO").length,nD:ds.length,area,anexos:[]};const nl=[l,...lib];setLib(nl);LS("t3-lib",nl);setSel(l);setVw("reader");}catch(e){alert("Erro: "+e.message);}setUp(false);if(fRef.current)fRef.current.value="";};
  const del=id=>{const nl=lib.filter(l=>l.id!==id);setLib(nl);LS("t3-lib",nl);if(sel?.id===id){setSel(null);setVw("library");}};
  const addAnexo=async(leiId,file)=>{try{const t=await pdfToText(file);let ds=parse(t);
    if(ds.length<3){const lines=t.split("\n").map(l=>l.trim()).filter(Boolean);ds=lines.map(l=>({tipo:"TEXTO",id:"",rub:"",txt:l}));}
    const anx={nome:file.name.replace(/\.pdf$/i,""),data:new Date().toLocaleDateString("pt-BR"),ds,nD:ds.length};
    const nl=lib.map(l=>l.id===leiId?{...l,anexos:[...(l.anexos||[]),anx]}:l);setLib(nl);LS("t3-lib",nl);if(sel?.id===leiId)setSel(nl.find(l=>l.id===leiId));return true;}catch(e){alert("Erro no anexo: "+e.message);return false;}};
  const delAnexo=(leiId,idx)=>{const nl=lib.map(l=>l.id===leiId?{...l,anexos:(l.anexos||[]).filter((_,i)=>i!==idx)}:l);setLib(nl);LS("t3-lib",nl);if(sel?.id===leiId)setSel(nl.find(l=>l.id===leiId));};
  useEffect(()=>{window.__teraAddRaw=(leiId,anx)=>{const nl2=lib.map(l=>l.id===leiId?{...l,anexos:[...(l.anexos||[]),anx]}:l);setLib(nl2);LS("t3-lib",nl2);if(sel?.id===leiId)setSel(nl2.find(l=>l.id===leiId));};},[lib,sel]);
  const uSt=(lid,di,f,v)=>{const k=`${lid}-${di}`;const n={...study,[k]:{...study[k],[f]:v}};setStudy(n);LS("t3-st",n);};
  const gSt=(lid,di,f)=>study[`${lid}-${di}`]?.[f]||"";
  const saveKey=k=>{setApiKey(k);LS("t3-key",k);};
  const nav=[{id:"library",ic:IC.bk,lb:"Biblioteca"},...(sel?[{id:"reader",ic:IC.ls,lb:sel.nome.slice(0,20)}]:[]),{id:"reforma",ic:IC.sc,lb:"Reforma"},{id:"atualizacoes",ic:IC.bl,lb:"Atualizações"}];

  return <div style={{minHeight:"100vh"}}>

      </div>
      <nav style={{display:"flex",gap:2,overflowX:"auto"}}>{nav.map(n=><button key={n.id} className={`nb ${vw===n.id?"on":""}`} onClick={()=>setVw(n.id)}><Ic d={n.ic} s={14} c={vw===n.id?"var(--gold)":"var(--text-sec)"}/>{n.lb}</button>)}</nav>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <ThemeBtn theme={theme} toggle={toggleTheme}/>
        <a href="https://www.planalto.gov.br" target="_blank" style={{fontSize:12,color:"var(--text-sec)",textDecoration:"none",padding:"5px 8px",border:"1px solid var(--border)",borderRadius:5,display:"flex",alignItems:"center",gap:3}}><Ic d={IC.lk} s={11} c="var(--text-sec)"/>Fontes</a>
        <select value={area} onChange={e=>setArea(e.target.value)} style={{background:"var(--input-bg)",border:"1px solid var(--border)",borderRadius:5,color:"var(--text)",padding:"5px 8px",fontSize:11}}>{Object.entries(AREAS).map(([k,v])=><option key={k} value={k}>{v.nome}</option>)}</select>
      </div>
    </header>
    <main style={{maxWidth:1440,margin:"0 auto",padding:"20px"}}>
      {vw==="library"&&<Lib lib={lib} sel={sel} onSel={l=>{setSel(l);setVw("reader");}} onDel={del} onUp={upF} uping={uping} fRef={fRef}/>}
      {vw==="reader"&&sel&&<Reader lei={sel} area={area} gSt={gSt} uSt={uSt} apiKey={apiKey} saveKey={saveKey} addAnexo={addAnexo} delAnexo={delAnexo} study={study}/>}
      {vw==="reforma"&&<Ref apiKey={apiKey} saveKey={saveKey}/>}

// ═══ LIBRARY ═══

    <button onClick={e=>{e.stopPropagation();onDel(l.id);}} style={{background:"none",border:"none",color:"var(--text-sec)",cursor:"pointer"}}><Ic d={IC.tr} s={13} c="#8A8279"/></button></div>
    <div style={{display:"flex",gap:10,marginTop:8,fontSize:11,color:"var(--text-sec)",fontFamily:"'Segoe UI',sans-serif"}}><span>{l.nA} artigos</span><span>{l.nD} dispositivos</span><span>{l.data}</span></div>
  </div>)}</div>}
</div>;}

// ═══ READER ═══
function Reader({lei,area,gSt,uSt,apiKey,saveKey,addAnexo,delAnexo,study}){
  const [tab,setTab]=useState("texto");const [saved,setSaved]=useState(false);const [goSearch,setGoSearch]=useState("");
  const tabs=[{id:"sumario",lb:"Sumário"},{id:"texto",lb:"Texto Integral"},{id:"artigos",lb:"Artigos"},{id:"estudo",lb:"Estudo Guiado"},{id:"remissoes",lb:"Remissões"},{id:"prazos",lb:"Prazos/Valores"},{id:"indice",lb:"Índice"},{id:"mapa",lb:"Mapa"},{id:"anexos",lb:`Anexos (${(lei.anexos||[]).length})`},{id:"teia",lb:"🕸 Teia"},{id:"tutor",lb:"Tutor IA"}];
  const ds=lei.ds;
  const showSaved=()=>{setSaved(true);setTimeout(()=>setSaved(false),1500);};
  const wrappedUSt=(a,b,c,d)=>{uSt(a,b,c,d);showSaved();};
  const exportXlsx=()=>{try{const wb=XLSX.utils.book_new();
    const txData=[["#","Tipo","Identificador","Rubrica","Texto"],...ds.map((d,i)=>[i+1,d.tipo,d.id,d.rub,d.txt])];
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(txData),"Texto Integral");
    const ctx=hierarquia(ds);let art="";const estData=[["Localização","Artigo","Dispositivo","Texto","Status","Dificuldade","Anotação"]];
    for(let i=0;i<ds.length;i++){const d=ds[i];if(d.tipo==="ARTIGO")art=d.id;if(!DIV.has(d.tipo))estData.push([ctx[art]||"",art,d.id,d.txt,gSt(lei.id,i,"status"),gSt(lei.id,i,"dif"),gSt(lei.id,i,"note")]);}
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(estData),"Estudo Guiado");
    const rem=extrairRemissoes(ds);const remData=[["#","Origem","Dispositivo","Referência","Contexto"],...rem.map((r,i)=>[i+1,r.origem,r.disp,r.destino,r.ctx])];
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(remData),"Remissões");
    const pv=extrairPrazosValores(ds);const pvData=[["#","Tipo","Conteúdo","Artigo","Capítulo","Contexto"],...pv.map((r,i)=>[i+1,r.tipo,r.val,r.art,r.cap,r.ctx])];
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(pvData),"Prazos e Valores");
    const idx=buildIdx(ds,area);const idxData=[["Palavra-chave","Artigos","Qtd"],...Object.entries(idx).map(([p,a])=>[p,a.join(", "),a.length])];
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(idxData),"Índice Remissivo");
    (lei.anexos||[]).forEach((anx,ai)=>{const axData=[["#","Tipo","Id","Texto"],...anx.ds.map((d,i)=>[i+1,d.tipo,d.id,d.txt])];
      XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(axData),"Anexo "+(ai+1));});
    XLSX.writeFile(wb,lei.nome+"_TERA.xlsx");}catch(e){alert("Erro ao exportar: "+e.message);}};
  return <div className="fade">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
      <div><h2 style={{fontSize:17,fontWeight:700}}>{lei.nome}</h2><div style={{fontSize:12,color:"var(--text-sec)",fontFamily:"'Segoe UI',sans-serif"}}>{lei.nD} dispositivos · {lei.nA} artigos · {(lei.anexos||[]).length} anexos · {AREAS[area]?.nome}</div></div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        {saved&&<span style={{fontSize:12,color:"var(--ok)",fontWeight:600,animation:"fadeIn .2s"}}>Salvo!</span>}
        <button onClick={exportXlsx} style={{display:"flex",alignItems:"center",gap:4,padding:"6px 14px",background:"var(--grad)",color:"#fff",border:"none",borderRadius:6,fontSize:12,fontWeight:600,cursor:"pointer"}}>Exportar Excel</button>
      </div>
    </div>
    <div style={{display:"flex",gap:0,borderBottom:"1px solid var(--border)",marginBottom:14,overflowX:"auto"}}>{tabs.map(t=><button key={t.id} className={`stab ${tab===t.id?"on":""}`} onClick={()=>setTab(t.id)}>{t.lb}</button>)}</div>
    {tab==="sumario"&&<TabSumario ds={ds}/>}
    {tab==="texto"&&<TabTexto ds={ds} lei={lei} gSt={gSt} uSt={wrappedUSt} initialSearch={goSearch}/>}
    {tab==="artigos"&&<TabArtigos ds={ds}/>}
    {tab==="estudo"&&<TabEstudo ds={ds} lei={lei} gSt={gSt} uSt={wrappedUSt}/>}
    {tab==="remissoes"&&<TabRemissoes ds={ds}/>}
    {tab==="teia"&&<TabTeia ds={ds}/>}
    {tab==="prazos"&&<TabPrazos ds={ds}/>}
    {tab==="indice"&&<TabIndice ds={ds} area={area} onGoToArt={a=>{setGoSearch(a);setTab("texto");}}/>}
    {tab==="mapa"&&<TabMapa ds={ds}/>}
    {tab==="anexos"&&<TabAnexos lei={lei} addAnexo={addAnexo} delAnexo={delAnexo}/>}
    {tab==="tutor"&&<TabTutor lei={lei} area={area} apiKey={apiKey} saveKey={saveKey}/>}
  </div>;
}

function TabSumario({ds}){const items=ds.filter(d=>DIV.has(d.tipo));return <div style={{maxHeight:"70vh",overflow:"auto"}}><table className="dt"><thead><tr><th>#</th><th>Tipo</th><th>Identificador</th><th>Rubrica</th></tr></thead><tbody>{items.map((d,i)=><tr key={i} style={{background:CT[d.tipo]||"#fff",color:d.tipo==="TÍTULO"||d.tipo==="CAPÍTULO"?"#fff":"#2D2A26"}}><td>{i+1}</td><td><span className="badge" style={{background:"rgba(0,0,0,.15)",color:"inherit"}}>{d.tipo}</span></td><td style={{fontWeight:700}}>{d.id}</td><td>{d.rub}</td></tr>)}</tbody></table></div>;}

function TabTexto({ds,lei,gSt,uSt,initialSearch}){const [srch,setSrch]=useState(initialSearch||"");useEffect(()=>{if(initialSearch)setSrch(initialSearch);},[initialSearch]);const fd=useMemo(()=>srch?ds.filter(d=>(d.txt+d.id+d.rub).toLowerCase().includes(srch.toLowerCase())):ds,[ds,srch]);
  const ind={TÍTULO:0,CAPÍTULO:12,SEÇÃO:24,SUBSEÇÃO:36,ARTIGO:0,PARÁGRAFO:20,INCISO:36,ALÍNEA:52,ITEM:68};
  const sts=["","Não lido","Lido","Revisando","Dominado","Dúvida"];const sC={Dominado:"#27AE60",Dúvida:"#C0392B",Revisando:"#D4A017",Lido:"#2E86AB"};
  return <div><div style={{marginBottom:10}}><input value={srch} onChange={e=>setSrch(e.target.value)} placeholder="Buscar na lei..." style={{width:"100%",maxWidth:"100%",background:"var(--bg-hover)",border:"1px solid var(--border)",borderRadius:6,padding:"10px 14px",fontSize:14,boxSizing:"border-box"}}/></div>
    <div style={{maxHeight:"68vh",overflow:"auto",border:"1px solid var(--border)",borderRadius:8}}>{fd.map((d,i)=>{const ri=ds.indexOf(d);const isD=DIV.has(d.tipo);const st=gSt(lei.id,ri,"status");const nt=gSt(lei.id,ri,"note");
      return <div key={ri} style={{display:"flex",borderBottom:"1px solid var(--border)",background:isD?CT[d.tipo]||"#F5EDDF":ri%2===0?"#fff":"#FAF7F2",paddingLeft:ind[d.tipo]||0}}>
        <div style={{minWidth:70,padding:"6px 4px",textAlign:"center"}}><span className="badge" style={{background:isD?"rgba(0,0,0,.1)":"#F3EDE4",color:isD?(d.tipo==="TÍTULO"||d.tipo==="CAPÍTULO"?"#fff":"#5C554A"):"#8A8279"}}>{d.tipo}</span></div>
        <div style={{flex:1,padding:"6px 8px",fontSize:12.5,lineHeight:1.6,color:isD?(d.tipo==="TÍTULO"?"#fff":"#2D2A26"):"#2D2A26",fontWeight:isD||d.tipo==="ARTIGO"?600:400}}>
          <span style={{color:isD?"inherit":"#B8965A",fontFamily:"'Segoe UI',sans-serif",fontSize:12,marginRight:4}}>{d.id}</span>
          {d.rub&&<i style={{opacity:.7}}>{d.rub} </i>}{d.txt}
          {nt&&<div style={{marginTop:3,padding:"2px 6px",background:"var(--gold-subtle)",borderLeft:"2px solid #B8965A",borderRadius:3,fontSize:11,color:"var(--gold)"}}>{nt}</div>}
        </div>
        {!isD&&<div style={{minWidth:100,padding:"5px 4px",display:"flex",flexDirection:"column",gap:3}}>
          <select value={st} onChange={e=>uSt(lei.id,ri,"status",e.target.value)} style={{background:"var(--bg-hover)",border:"1px solid var(--border)",borderRadius:3,color:sC[st]||"#8A8279",padding:"2px",fontSize:11,cursor:"pointer"}}>{sts.map(s=><option key={s} value={s}>{s||"Status"}</option>)}</select>
          <textarea placeholder="Anotação..." defaultValue={nt} onBlur={e=>uSt(lei.id,ri,"note",e.target.value)} style={{background:"var(--input-bg)",border:"1px solid var(--border)",borderRadius:4,padding:"4px 6px",fontSize:12,width:"100%",minHeight:50,maxHeight:150,resize:"vertical",fontFamily:"inherit"}}/>
        </div>}
      </div>;})}</div></div>;
}

function TabArtigos({ds}){let art="";const rows=[];const tipos=new Set(["ARTIGO","PARÁGRAFO","INCISO","ALÍNEA","ITEM"]);
  for(const d of ds){if(d.tipo==="ARTIGO")art=d.id;if(tipos.has(d.tipo))rows.push({art,tipo:d.tipo,id:d.id,rub:d.rub,txt:d.txt});}
  return <div style={{maxHeight:"70vh",overflow:"auto"}}><table className="dt"><thead><tr><th>Artigo</th><th>Tipo</th><th>Identificador</th><th>Rubrica</th><th>Texto</th></tr></thead><tbody>{rows.map((r,i)=><tr key={i}><td style={{fontWeight:700,color:"var(--gold)"}}>{r.art}</td><td><span className="badge" style={{background:"var(--gold-subtle)",color:"var(--gold)"}}>{r.tipo}</span></td><td style={{fontSize:12}}>{r.id}</td><td style={{fontSize:12,fontStyle:"italic"}}>{r.rub}</td><td style={{fontSize:12}}>{r.txt.slice(0,100)}</td></tr>)}</tbody></table></div>;}

function TabEstudo({ds,lei,gSt,uSt}){const [filtroStatus,setFiltroStatus]=useState("");const fd=useMemo(()=>{let items=ds.filter(d=>!DIV.has(d.tipo));if(filtroStatus)items=items.filter((_,i)=>gSt(lei.id,i,"status")===filtroStatus);return items;},[ds,lei,filtroStatus,gSt]);
  const sts=["Não lido","Lido","Revisando","Dominado","Dúvida"];const sC={Dominado:"#27AE60",Dúvida:"#C0392B",Revisando:"#D4A017",Lido:"#2E86AB"};
  return <div><div style={{marginBottom:12,display:"flex",gap:8,flexWrap:"wrap"}}>{sts.map(s=><button key={s} onClick={()=>setFiltroStatus(filtroStatus===s?"":s)} style={{padding:"6px 12px",background:filtroStatus===s?"var(--grad)":"var(--bg-hover)",color:filtroStatus===s?"#fff":"var(--text-sec)",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600}}>{s}</button>)}</div>
    <div style={{maxHeight:"65vh",overflow:"auto"}}>{fd.length===0?<div style={{textAlign:"center",padding:20,color:"var(--text-sec)"}}>Nenhum item encontrado</div>:<table className="dt"><thead><tr><th>Dispositivo</th><th>Texto</th><th>Status</th><th>Dificuldade</th><th>Anotação</th></tr></thead><tbody>{fd.map((d,i)=>{const ri=ds.indexOf(d);const st=gSt(lei.id,ri,"status");const dif=gSt(lei.id,ri,"dif");const nt=gSt(lei.id,ri,"note");return <tr key={ri}><td style={{fontWeight:700,fontSize:12}}>{d.id}</td><td style={{fontSize:12}}>{d.txt.slice(0,80)}</td><td><span className="badge" style={{background:(sC[st]||"#8A8279")+"22",color:sC[st]||"#8A8279"}}>{st||"—"}</span></td><td><select value={dif} onChange={e=>uSt(lei.id,ri,"dif",e.target.value)} style={{fontSize:11,padding:"2px 4px",background:"var(--bg-hover)",border:"1px solid var(--border)",borderRadius:3}}><option value="">—</option><option value="Fácil">Fácil</option><option value="Médio">Médio</option><option value="Difícil">Difícil</option></select></td><td><input type="text" defaultValue={nt} onBlur={e=>uSt(lei.id,ri,"note",e.target.value)} placeholder="..." style={{fontSize:11,padding:"2px 4px",width:"100%",background:"var(--input-bg)",border:"1px solid var(--border)",borderRadius:3}}/></td></tr>})}</tbody></table>}</div></div>;}

function TabRemissoes({ds}){const rem=useMemo(()=>extrairRemissoes(ds),[ds]);return <div style={{maxHeight:"70vh",overflow:"auto"}}>{rem.length===0?<div style={{textAlign:"center",padding:40,color:"var(--text-sec)"}}>Nenhuma remissão encontrada</div>:<table className="dt"><thead><tr><th>Origem</th><th>Dispositivo</th><th>Referência</th><th>Contexto</th></tr></thead><tbody>{rem.map((r,i)=><tr key={i}><td style={{fontWeight:700,color:"var(--gold)"}}>{r.origem}</td><td style={{fontSize:12}}>{r.disp}</td><td style={{fontWeight:600,color:"var(--gold)"}}>{r.destino}</td><td style={{fontSize:12}}>{r.ctx.slice(0,100)}</td></tr>)}</tbody></table>}</div>;}

function TabPrazos({ds}){const pv=useMemo(()=>extrairPrazosValores(ds),[ds]);return <div style={{maxHeight:"70vh",overflow:"auto"}}>{pv.length===0?<div style={{textAlign:"center",padding:40,color:"var(--text-sec)"}}>Nenhum prazo ou valor encontrado</div>:<table className="dt"><thead><tr><th>Tipo</th><th>Conteúdo</th><th>Artigo</th><th>Capítulo</th><th>Contexto</th></tr></thead><tbody>{pv.map((p,i)=><tr key={i}><td><span className="badge" style={{background:"var(--gold-subtle)",color:"var(--gold)"}}>{p.tipo}</span></td><td style={{fontWeight:600}}>{p.val}</td><td>{p.art}</td><td style={{fontSize:12}}>{p.cap}</td><td style={{fontSize:12}}>{p.ctx.slice(0,80)}</td></tr>)}</tbody></table>}</div>;}

function TabAnexos({lei,addAnexo,delAnexo}){const [uping,setUp]=useState(false);const [selAnx,setSelAnx]=useState(null);const fRef=useRef(null);
  const upAnx=async e=>{const files=e.target.files;if(!files||!files.length)return;setUp(true);

      <div style={{display:"flex",gap:8,alignItems:"center"}}>

          {uping?<><Sp/> Carregando...</>:<>&#8595; IN 2.121 (29 Anexos)</>}

    :<div style={{display:"flex",gap:16}}>
      <div style={{minWidth:220,display:"flex",flexDirection:"column",gap:4}}>
        {anexos.map((a,i)=><div key={i} className="cd" style={{padding:"10px 12px",cursor:"pointer",borderColor:selAnx===i?"#B8965A":"#E8DFD0",background:selAnx===i?"#F5EDDF":"#fff"}} onClick={()=>setSelAnx(i)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div><div style={{fontWeight:600,fontSize:13}}>{a.nome}</div><div style={{fontSize:11,color:"var(--text-sec)",fontFamily:"'Segoe UI',sans-serif",marginTop:2}}>{a.nD} itens · {a.data}</div></div>
            <button onClick={e=>{e.stopPropagation();rmAnx(i);}} style={{background:"none",border:"none",cursor:"pointer",color:"var(--err)",padding:2}} title="Excluir anexo"><Ic d={IC.tr} s={13} c="#C0392B"/></button>
          </div>
        </div>)}

        <table className="dt"><thead><tr><th>#</th><th>Tipo</th><th>Id</th><th>Texto</th></tr></thead><tbody>{anexos[selAnx].ds.map((d,i)=>
          <tr key={i}><td>{i+1}</td><td><span className="badge" style={{background:"var(--gold-subtle)",color:"var(--gold)"}}>{d.tipo||"TEXTO"}</span></td><td style={{fontFamily:"'Segoe UI',sans-serif",fontSize:11}}>{d.id}</td><td style={{fontSize:12}}>{d.txt}{d.rub&&<i style={{opacity:.7}}> {d.rub}</i>}</td></tr>
        )}</tbody></table>
      </div>}
    </div>}
  </div>;
}

function TabTutor({lei,area,apiKey,saveKey}){const [msgs,setMsgs]=useState([]);const [inp,setInp]=useState("");const [ld,setLd]=useState(false);const [localKey,setLocalKey]=useState(apiKey);const cr=useRef(null);const ir=useRef(null);
  useEffect(()=>{cr.current&&(cr.current.scrollTop=cr.current.scrollHeight);},[msgs]);

    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14,flexWrap:"wrap",gap:10}}>
      <div><h2 style={{fontSize:19,fontWeight:700}}>Atualizações</h2><div style={{fontSize:12,color:"var(--text-sec)",marginTop:2}}>DOU · Fazenda · NF-e — {hist.length} itens · auto-atualiza seg–sex 07:00</div></div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        <button onClick={exportXLSX} disabled={hist.length===0} style={{display:"flex",alignItems:"center",gap:5,padding:"7px 14px",background:"var(--gold-subtle)",color:"var(--gold)",border:"1px solid var(--gold-bright)",borderRadius:7,cursor:"pointer",fontSize:13,fontWeight:600}}>⬇ Exportar XLSX</button>
        <button onClick={buscar} disabled={ld} style={{display:"flex",alignItems:"center",gap:5,padding:"8px 18px",background:"var(--grad)",color:"#fff",border:"none",borderRadius:7,cursor:ld?"wait":"pointer",fontSize:14,fontWeight:600,opacity:ld?.6:1}}>{ld?<Sp/>:<Ic d={IC.rf} s={13} c="#fff"/>}{ld?"Buscando...":"Buscar Agora"}</button>
      </div>
    </div>
    <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap"}}>{FONTES.map((f,i)=><a key={i} href={f.u} target="_blank" className="cd" style={{padding:"7px 11px",textDecoration:"none",color:"var(--text)",display:"flex",alignItems:"center",gap:5,fontSize:12}}><Ic d={IC.lk} s={12} c="#B8965A"/>{f.n}</a>)}</div>
    <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
      <span style={{fontSize:12,color:"var(--text-sec)"}}>Filtros:</span>
      <select value={filtro} onChange={e=>setFiltro(e.target.value)} style={{background:"var(--bg-hover)",border:"1px solid var(--border)",borderRadius:5,padding:"4px 8px",fontSize:11}}>{fontes.map(f=><option key={f}>{f}</option>)}</select>
      <input value={de} onChange={e=>setDe(e.target.value)} placeholder="De: dd/mm/aaaa" style={{background:"var(--bg-hover)",border:"1px solid var(--border)",borderRadius:5,padding:"4px 8px",fontSize:12,width:110}}/>
      <input value={ate} onChange={e=>setAte(e.target.value)} placeholder="Até: dd/mm/aaaa" style={{background:"var(--bg-hover)",border:"1px solid var(--border)",borderRadius:5,padding:"4px 8px",fontSize:12,width:110}}/>
      <span style={{fontSize:12,color:"var(--text-sec)"}}>{filtered.length} resultados</span>
      {!mostrarTudo&&hist.length>0&&<button onClick={()=>setMostrarTudo(true)} style={{background:"none",border:"1px solid var(--border)",borderRadius:5,padding:"4px 8px",fontSize:11,color:"var(--text-sec)",cursor:"pointer"}}>Ver histórico completo</button>}
      {mostrarTudo&&<button onClick={()=>setMostrarTudo(false)} style={{background:"none",border:"1px solid var(--border)",borderRadius:5,padding:"4px 8px",fontSize:11,color:"var(--text-sec)",cursor:"pointer"}}>Ver apenas última atualização</button>}
      {hist.length>0&&<button onClick={()=>{if(confirm("Limpar todo o histórico?")){setHist([]);LS("t3-upd",[]);}}} style={{background:"none",border:"1px solid var(--border)",borderRadius:5,padding:"4px 8px",fontSize:11,color:"var(--err)",cursor:"pointer"}}>🗑 Limpar Histórico</button>}
    </div>
    {filtered.length>0?<div style={{display:"flex",flexDirection:"column",gap:6}}>{filtered.map((h,i)=><div key={i} className="cd" style={{padding:"12px 14px",borderColor:isFav(h)?"#D4B882":"#E8DFD0"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{flex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}><span className="badge" style={{background:"var(--gold-subtle)",color:"var(--gold)"}}>{h.fonte}</span><span style={{fontSize:11,color:"var(--text-sec)",fontFamily:"'Segoe UI',sans-serif"}}>{h.data}</span></div>
          <div style={{fontWeight:600,fontSize:13}}>{h.titulo}</div>
          {h.resumo&&<div style={{fontSize:13,color:"var(--text-sec)",marginTop:2,lineHeight:1.5}}>{h.resumo}</div>}
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",marginLeft:10,flexShrink:0}}>
          <button onClick={()=>toggleFav(hist.indexOf(h))} title={isFav(h)?"Remover favorito":"Favoritar"} style={{background:"none",border:"none",fontSize:16,cursor:"pointer",opacity:isFav(h)?1:.4,color:"#D4B882"}}>★</button>
          {h.link&&h.link.startsWith("http")&&<a href={h.link} target="_blank" style={{display:"flex",alignItems:"center",gap:3,fontSize:12,color:"var(--gold)",textDecoration:"none",whiteSpace:"nowrap",marginLeft:10}}><Ic d={IC.lk} s={11} c="#B8965A"/>Fonte</a>}
        </div>
      </div>
      <div style={{fontSize:11,color:"var(--text-sec)",marginTop:4,fontFamily:"'Segoe UI',sans-serif"}}>Buscado em {h.fetchDate} às {h.fetchTime}</div>
    </div>)}</div>:<div style={{textAlign:"center",padding:32,color:"var(--text-sec)"}}><div style={{fontSize:14}}>Nenhum resultado{filtro!=="Todas"?" para este filtro":""}</div><div style={{fontSize:14,marginTop:4}}>Clique "Buscar Agora" para começar</div></div>}
  </div>;
}

ReactDOM.render(<ErrorBoundary><App/></ErrorBoundary>,document.getElementById("root"));
</script>
</body>
</html>
