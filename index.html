// Parser
const PATS=[{t:"PARTE",r:/^\s*PARTE\s+(?:GERAL|ESPECIAL|[IVXLCDM]+|PRELIMINAR)\s*$/i},{t:"LIVRO",r:/^\s*LIVRO\s+(?:[IVXLCDM]+|ÚNICO)\s*$/i},{t:"TÍTULO",r:/^\s*T[ÍI]TULO\s+(?:[IVXLCDM]+|ÚNICO)\s*$/i},{t:"CAPÍTULO",r:/^\s*CAP[ÍI]TULO\s+(?:[IVXLCDM]+|ÚNICO)\s*$/i},{t:"SEÇÃO",r:/^\s*SE[ÇC][ÃA]O\s+(?:[IVXLCDM]+|ÚNICA)\s*$/i},{t:"SUBSEÇÃO",r:/^\s*SUBSE[ÇC][ÃA]O\s+(?:[IVXLCDM]+|ÚNICA)\s*$/i},{t:"ARTIGO",r:/^\s*Art\.\s*\d+[ºo°]?[\s\-\.]+/},{t:"PARÁGRAFO",r:/^\s*(?:§\s*\d+[ºo°]?\.?\s|Par[áa]grafo\s+[úu]nico\.?\s)/i},{t:"INCISO",r:/^\s*[IVXLCDM]+\s*[\-–—]\s+/},{t:"ALÍNEA",r:/^\s*[a-z]\)\s+/},{t:"ITEM",r:/^\s*\d+\.\s+/}];

function idT(s){for(const p of PATS)if(p.r.test(s.trim()))return p.t;return null;}
function exId(t,s){s=s.trim();if(DIV.has(t))return s;const R={ARTIGO:/^(Art\.\s*\d+[ºo°]?[\-\.]?)/,PARÁGRAFO:/^(§\s*\d+[ºo°]?\.?|Par[áa]grafo\s+[úu]nico\.?)/i,INCISO:/^([IVXLCDM]+)\s*[\-–—]/,ALÍNEA:/^([a-z]\))/,ITEM:/^(\d+\.)/};const m=R[t]?.exec(s);return m?m[1].trim():s.slice(0,30);}
function exTx(t,s){s=s.trim();if(DIV.has(t))return"";const R={ARTIGO:/^Art\.\s*\d+[ºo°]?[\s\-\.]+(.+)/,PARÁGRAFO:/^(?:§\s*\d+[ºo°]?\.?\s+|Par[áa]grafo\s+[úu]nico\.?\s+)(.+)/i,INCISO:/^[IVXLCDM]+\s*[\-–—]\s+(.+)/,ALÍNEA:/^[a-z]\)\s+(.+)/,ITEM:/^\d+\.\s+(.+)/};const m=R[t]?.exec(s);return m?m[1].trim():s;}
function parse(txt){const ds=[];let a=null,ag=false;const reAltera=/\[?\s*(Reda[çc][ãa]o dada pel[oa]\(a\)[^\]]*|Inclu[ií]d[oa]\(a\) pel[oa]\(a\)[^\]]*|Revogad[oa]\(a\) pel[oa]\(a\)[^\]]*)\]?/gi;const reVetado=/\(\s*(?:VETADO|Vetado|vetado)\s*\)/;const reRevogado=/\(\s*(?:REVOGADO|Revogado|revogado)\s*\)/;
  for(const l of txt.split("\n")){const s=l.trim();if(!s){if(ag&&a)ag=false;continue;}const t=idT(s);if(t){let alteracao="";let status="vigente";const altM=s.match(reAltera);if(altM)alteracao=altM.map(m=>m.replace(/^\[|\]$/g,"").trim()).join("; ");const cleanTxt=s.replace(reAltera,"").trim();if(reVetado.test(cleanTxt))status="vetado";else if(reRevogado.test(cleanTxt))status="revogado";a={tipo:t,id:exId(t,cleanTxt),rub:"",txt:exTx(t,cleanTxt),status,alteracao};ds.push(a);ag=DIV.has(t);}else if(a){if(ag&&!a.rub){a.rub=s;ag=false;}else{const altM=s.match(reAltera);if(altM){a.alteracao=a.alteracao?(a.alteracao+"; "+altM.map(m=>m.replace(/^\[|\]$/g,"").trim()).join("; ")):altM.map(m=>m.replace(/^\[|\]$/g,"").trim()).join("; ");const cleaned=s.replace(reAltera,"").trim();if(cleaned)a.txt=a.txt?a.txt+" "+cleaned:cleaned;}else{a.txt=a.txt?a.txt+" "+s:s;}}if(reVetado.test(a.txt))a.status="vetado";if(reRevogado.test(a.txt))a.status="revogado";}}return detectVetados(ds);}

function detectVetados(ds){
  // Detecta vetos por IDs duplicados consecutivos (LC 95/1998):
  // Quando o mesmo dispositivo (mesmo tipo + mesmo identificador normalizado)
  // aparece mais de uma vez em sequência, as versões anteriores estão vetadas/superadas.
  // A última ocorrência é a versão vigente (pode ter "Redação dada pela...").
  const normId=id=>(id||"").replace(/[^a-zA-Z0-9ºo°§úÚ]/g,"").toLowerCase();
  for(let i=0;i<ds.length;i++){
    if(DIV.has(ds[i].tipo)||ds[i].status!=="vigente")continue;
    const myNorm=normId(ds[i].id);if(!myNorm)continue;
    // Procura adiante: pula divisões e dispositivos filhos, busca mesmo tipo+id
    let j=i+1;
    // Coleta o bloco de filhos do dispositivo atual
    const nivHier={"ARTIGO":0,"PARÁGRAFO":1,"INCISO":2,"ALÍNEA":3,"ITEM":4};
    const meuNiv=nivHier[ds[i].tipo];
    if(meuNiv===undefined)continue;
    while(j<ds.length){
      if(DIV.has(ds[j].tipo)){j++;continue;}
      const outroNiv=nivHier[ds[j].tipo];
      if(outroNiv===undefined){j++;continue;}
      // Se encontrou mesmo tipo com mesmo ID = versão anterior é vetada
      if(ds[j].tipo===ds[i].tipo&&normId(ds[j].id)===myNorm){
        ds[i].status="vetado";break;
      }
      // Se encontrou dispositivo do mesmo nível ou superior com ID diferente, para
      if(outroNiv<=meuNiv&&normId(ds[j].id)!==myNorm)break;
      j++;
    }
  }
  return ds;
}

function extrairRemissoes(ds){const re=/(?:§\s*\d+[ºo°]?\s+d[oe]\s+)?(?:arts?\.\s*)(\d+[ºo°]?(?:\s*(?:,|e|a)\s*\d+[ºo°]?)*)/gi;const res=[];let art="";

function extrairPrazosValores(ds){const reVal=/R\$\s*[\d\.]+,\d{2}/g;const rePct=/\d+(?:[,\.]\d+)?\s*%/g;const rePrazo=/(?:\d+\s*(?:dias?|meses?|anos?|horas?))|(?:at[ée]\s+\d{1,2}\s+de\s+\w+)/gi;
  const res=[];let art="",cap="";for(const d of ds){if(d.tipo==="CAPÍTULO")cap=d.rub||d.id;if(d.tipo==="ARTIGO")art=d.id;if(!d.txt)continue;
    for(const rx of[[reVal,"VALOR (R$)"],[rePct,"PERCENTUAL (%)"],[rePrazo,"PRAZO"]]){rx[0].lastIndex=0;let m;while((m=rx[0].exec(d.txt))!==null)res.push({art,cap,disp:d.id,tipo:rx[1],val:m[0],ctx:d.txt});}}return res;}

function buildIdx(ds,area){const ws=AREAS[area]?.palavras||[];const idx={};let art="";for(const d of ds){if(d.tipo==="ARTIGO")art=d.id;const t=(d.txt+" "+d.rub).toLowerCase();for(const w of ws)if(t.includes(w.toLowerCase())&&art){if(!idx[w])idx[w]=[];if(!idx[w].includes(art))idx[w].push(art);}}return Object.fromEntries(Object.entries(idx).sort((a,b)=>a[0].localeCompare(b[0],"pt")));}

function fullTextSearch(ds,termo){
  if(!termo||termo.length<3)return[];
  const t=termo.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const resultados=[];let artAtual="";
  for(let i=0;i<ds.length;i++){const d=ds[i];
    if(d.tipo==="ARTIGO")artAtual=d.id;
    const texto=((d.id||"")+" "+(d.rub||"")+" "+(d.txt||"")).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    if(texto.includes(t)){
      const ocorrencias=(texto.split(t).length-1);
      resultados.push({idx:i,tipo:d.tipo,id:d.id,art:artAtual,txt:d.txt,rub:d.rub,ocorrencias,status:d.status||"vigente"});
    }
  }
  return resultados;
}

function hierarquia(ds){const ctx={};const trilha={PARTE:"",LIVRO:"",TÍTULO:"",CAPÍTULO:"",SEÇÃO:"",SUBSEÇÃO:""};const niv=["PARTE","LIVRO","TÍTULO","CAPÍTULO","SEÇÃO","SUBSEÇÃO"];
  for(const d of ds){if(DIV.has(d.tipo)){trilha[d.tipo]=d.rub||d.id;const i=niv.indexOf(d.tipo);for(let j=i+1;j<niv.length;j++)trilha[niv[j]]="";}
    if(d.tipo==="ARTIGO")ctx[d.id]=Object.values(trilha).filter(Boolean).join(" > ");}return ctx;}

async function pdfToText(f){const ab=await f.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:ab}).promise;let fullText="";
  for(let i=1;i<=pdf.numPages;i++){const pg=await pdf.getPage(i);const c=await pg.getTextContent();
    const items=c.items.filter(x=>x.str.trim()).sort((a,b)=>{const dy=b.transform[5]-a.transform[5];return Math.abs(dy)>3?dy:a.transform[4]-b.transform[4];});
    let lastY=null;let line="";
    for(const item of items){const y=Math.round(item.transform[5]);
      if(lastY!==null&&Math.abs(y-lastY)>3){fullText+=line.trim()+"\n";line="";}
      line+=(line?" ":"")+item.str;lastY=y;}
    if(line.trim())fullText+=line.trim()+"\n";}
  fullText=fullText.replace(/([.;:)\]]) *(§\s*\d)/g,"$1\n$2");
  fullText=fullText.replace(/([.;:)\]]) *(Parágrafo único)/gi,"$1\n$2");
  fullText=fullText.replace(/ (TÍTULO\s+[IVXLCDM])/g,"\n$1");
  fullText=fullText.replace(/ (CAPÍTULO\s+[IVXLCDM])/g,"\n$1");
  fullText=fullText.replace(/ (Seção\s+[IVXLCDM])/gi,"\n$1");
  fullText=fullText.replace(/ (Subseção\s+[IVXLCDM])/gi,"\n$1");
  fullText=fullText.replace(/ (PARTE\s+(?:GERAL|ESPECIAL|[IVXLCDM]))/g,"\n$1");
  fullText=fullText.replace(/ (LIVRO\s+[IVXLCDM])/g,"\n$1");
  fullText=fullText.replace(/\s*(?:\u0000|\ufffd)?\s*ANEXO\s+[IVXLCDM]+\.pdf/gi,"");
  fullText=fullText.replace(/ANEXO\s+[IVXLCDM]+\.pdf/gi,"");
  fullText=fullText.replace(/\* Este texto não substitui o publicado oficialmente\./gi,"");
  return fullText;}

class ErrorBoundary extends React.Component{constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(error){return{hasError:true,error};}
  componentDidCatch(error,errorInfo){console.error("Erro capturado:",error,errorInfo);}
  render(){if(this.state.hasError){return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)",padding:20}}><div style={{maxWidth:500,textAlign:"center"}}><div style={{fontSize:32,marginBottom:16}}>⚠️</div><h1 style={{fontSize:24,fontWeight:700,marginBottom:12,color:"var(--text)"}}>Erro na Renderização</h1><p style={{fontSize:14,color:"var(--text-sec)",marginBottom:16,lineHeight:1.6}}>Ocorreu um erro ao carregar a aplicação. Por favor, recarregue a página.</p><details style={{marginTop:16,padding:12,background:"var(--bg-hover)",borderRadius:8,textAlign:"left",fontSize:12}}><summary style={{cursor:"pointer",fontWeight:600,marginBottom:8}}>Detalhes do Erro</summary><pre style={{overflow:"auto",padding:8,background:"var(--bg-card)",borderRadius:4,fontSize:11}}>{this.state.error?.toString()}</pre></details><button onClick={()=>window.location.reload()} style={{marginTop:16,padding:"10px 20px",background:"var(--grad)",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:14,fontWeight:600}}>Recarregar Página</button></div></div>;}return this.props.children;}}

// ═══ APP ═══
function App(){
  const [theme,setTheme]=useState(()=>{try{return localStorage.getItem("t3-theme")||"dark"}catch{return"dark"}});
  useEffect(()=>{document.body.setAttribute("data-theme",theme);try{localStorage.setItem("t3-theme",theme)}catch{}},[theme]);
  const toggleTheme=()=>setTheme(t=>t==="dark"?"light":"dark");
  const [lib,setLib]=useState(()=>LS("t3-lib")||[]);const [sel,setSel]=useState(null);const [vw,setVw]=useState("library");const [uping,setUp]=useState(false);const [area,setArea]=useState("tributario");const [study,setStudy]=useState(()=>LS("t3-st")||{});const [apiKey,setApiKey]=useState(()=>LS("t3-key")||"");const fRef=useRef(null);

  const upF=async e=>{const f=e.target.files?.[0];if(!f)return;setUp(true);try{const t=await pdfToText(f);const ds=parse(t);const l={id:Date.now()+"",nome:f.name.replace(/\.pdf$/i,""),data:new Date().toLocaleDateString("pt-BR"),ds,nA:ds.filter(d=>d.tipo==="ARTIGO").length,nD:ds.length,area,anexos:[]};const nl=[l,...lib];setLib(nl);LS("t3-lib",nl);setSel(l);setVw("reader");}catch(e){alert("Erro: "+e.message);}setUp(false);if(fRef.current)fRef.current.value="";};
  const del=id=>{const nl=lib.filter(l=>l.id!==id);setLib(nl);LS("t3-lib",nl);if(sel?.id===id){setSel(null);setVw("library");}};
  const addAnexo=async(leiId,file)=>{try{const t=await pdfToText(file);let ds=parse(t);
    if(ds.length<3){const lines=t.split("\n").map(l=>l.trim()).filter(Boolean);ds=lines.map(l=>({tipo:"TEXTO",id:"",rub:"",txt:l}));}
    const anx={nome:file.name.replace(/\.pdf$/i,""),data:new Date().toLocaleDateString("pt-BR"),ds,nD:ds.length};
    const nl=lib.map(l=>l.id===leiId?{...l,anexos:[...(l.anexos||[]),anx]}:l);setLib(nl);LS("t3-lib",nl);if(sel?.id===leiId)setSel(nl.find(l=>l.id===leiId));return true;}catch(e){alert("Erro no anexo: "+e.message);return false;}};
  const delAnexo=(leiId,idx)=>{const nl=lib.map(l=>l.id===leiId?{...l,anexos:(l.anexos||[]).filter((_,i)=>i!==idx)}:l);setLib(nl);LS("t3-lib",nl);if(sel?.id===leiId)setSel(nl.find(l=>l.id===leiId));};
  const uSt=(lid,di,f,v)=>{const k=`${lid}-${di}`;const n={...study,[k]:{...study[k],[f]:v}};setStudy(n);LS("t3-st",n);};
  const gSt=(lid,di,f)=>study[`${lid}-${di}`]?.[f]||"";
  const saveKey=k=>{setApiKey(k);LS("t3-key",k);};
  const exportBackup=()=>{try{const data={lib,study,apiKey,area,exportDate:new Date().toISOString()};const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="TERA_backup_"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(url);}catch(e){alert("Erro ao exportar: "+e.message);}};
  const importBackup=()=>{const inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=async e=>{const f=e.target.files?.[0];if(!f)return;try{const txt=await f.text();const data=JSON.parse(txt);if(data.lib){setLib(data.lib);LS("t3-lib",data.lib);}if(data.study){setStudy(data.study);LS("t3-st",data.study);}if(data.apiKey){setApiKey(data.apiKey);LS("t3-key",data.apiKey);}alert("Backup restaurado com sucesso! "+((data.lib||[]).length)+" leis e "+(Object.keys(data.study||{}).length)+" anotações importadas.");}catch(e){alert("Erro ao importar: "+e.message);}};inp.click();};
  const nav=[{id:"library",ic:IC.bk,lb:"Biblioteca"},...(sel?[{id:"reader",ic:IC.ls,lb:sel.nome.slice(0,20)}]:[]),{id:"reforma",ic:IC.sc,lb:"Reforma"},{id:"atualizacoes",ic:IC.bl,lb:"Atualizações"}];

  return <div style={{minHeight:"100vh"}}>
    <header style={{background:"var(--bg-card)",borderBottom:"1px solid var(--border)",padding:"8px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,boxShadow:"var(--shadow)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <Logo/>
        <div><div style={{fontSize:15,fontWeight:700,letterSpacing:"1px"}}>TERA</div><div style={{fontSize:11,color:"var(--text-sec)"}}>RACIOCÍNIO JURÍDICO</div></div>
      </div>
      <nav style={{display:"flex",gap:2,overflowX:"auto"}}>{nav.map(n=><button key={n.id} className={`nb ${vw===n.id?"on":""}`} onClick={()=>setVw(n.id)}><Ic d={n.ic} s={14} c={vw===n.id?"var(--gold)":"var(--text-sec)"}/>{n.lb}</button>)}</nav>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <ThemeBtn theme={theme} toggle={toggleTheme}/>
        <button onClick={exportBackup} title="Exportar Backup (Leis + Anotações)" style={{fontSize:11,color:"var(--text-sec)",padding:"5px 8px",border:"1px solid var(--border)",borderRadius:5,background:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:3}}><Ic d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" s={11} c="var(--text-sec)"/>Backup</button>
        <button onClick={importBackup} title="Importar Backup" style={{fontSize:11,color:"var(--text-sec)",padding:"5px 8px",border:"1px solid var(--border)",borderRadius:5,background:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:3}}><Ic d={IC.up} s={11} c="var(--text-sec)"/>Restaurar</button>
        <a href="https://www.planalto.gov.br" target="_blank" style={{fontSize:12,color:"var(--text-sec)",textDecoration:"none",padding:"5px 8px",border:"1px solid var(--border)",borderRadius:5,display:"flex",alignItems:"center",gap:3}}><Ic d={IC.lk} s={11} c="var(--text-sec)"/>Fontes</a>
        <select value={area} onChange={e=>setArea(e.target.value)} style={{background:"var(--input-bg)",border:"1px solid var(--border)",borderRadius:5,color:"var(--text)",padding:"5px 8px",fontSize:11}}>{Object.entries(AREAS).map(([k,v])=><option key={k} value={k}>{v.nome}</option>)}</select>
      </div>
    </header>
    <main style={{maxWidth:1440,margin:"0 auto",padding:"20px"}}>
      {vw==="library"&&<Lib lib={lib} sel={sel} onSel={l=>{setSel(l);setVw("reader");}} onDel={del} onUp={upF} uping={uping} fRef={fRef}/>}
      {vw==="reader"&&sel&&<Reader lei={sel} area={area} gSt={gSt} uSt={uSt} apiKey={apiKey} saveKey={saveKey} addAnexo={addAnexo} delAnexo={delAnexo} study={study}/>}
      {vw==="reforma"&&<Ref apiKey={apiKey} saveKey={saveKey}/>}
      {vw==="atualizacoes"&&<Atl apiKey={apiKey} saveKey={saveKey}/>}
    </main>
  </div>;
}

function Logo(){return <svg width={36} height={36} viewBox="0 0 36 36"><defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stopColor="#d4a853"/><stop offset="100%" stopColor="#f5d98a"/></linearGradient></defs><rect width={36} height={36} rx={10} fill="url(#lg)"/><text x={18} y={25} textAnchor="middle" fill="#0c0e12" fontWeight={800} fontSize={20} fontFamily="'Segoe UI',sans-serif">T</text></svg>;}
function ThemeBtn({theme,toggle}){return <button className="theme-toggle" onClick={toggle} title={theme==="dark"?"Modo Claro":"Modo Escuro"}><svg width={18} height={18} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{theme==="dark"?<><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></>:<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>}</svg></button>;}

// ═══ LIBRARY ═══
function Lib({lib,sel,onSel,onDel,onUp,uping,fRef}){return <div className="fade">
  <div style={{border:"2px dashed var(--border)",borderRadius:14,padding:"40px 28px",textAlign:"center",marginBottom:24,background:"var(--bg-hover)"}}>
    {uping?<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}><Sp/><span style={{color:"var(--text-sec)",fontSize:14}}>Processando PDF e extraindo estrutura...</span></div>
    :<><Ic d={IC.up} s={26} c="#B8965A"/><div style={{marginTop:8,fontSize:17,fontWeight:600}}>Adicionar Lei</div><div style={{color:"var(--text-sec)",fontSize:14,marginTop:3,marginBottom:12}}>O parser LC 95/1998 roda local — sem gastar IA</div>
      <label style={{display:"inline-flex",alignItems:"center",gap:7,padding:"9px 24px",background:"var(--grad)",color:"#fff",borderRadius:7,cursor:"pointer",fontSize:14,fontWeight:600}}><Ic d={IC.up} s={14} c="#fff"/>Selecionar PDF<input ref={fRef} type="file" accept=".pdf" onChange={onUp} style={{display:"none"}}/></label></>}
  </div>
  {lib.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:10}}>{lib.map(l=><div key={l.id} className="cd" style={{padding:14,cursor:"pointer",borderColor:sel?.id===l.id?"#B8965A":"#E8DFD0"}} onClick={()=>onSel(l)}>
    <div style={{display:"flex",justifyContent:"space-between"}}><div><div style={{fontSize:14,fontWeight:600,marginBottom:4}}>{l.nome}</div><span className="tg" style={{background:"var(--gold-subtle)",color:"var(--gold)"}}>{AREAS[l.area]?.nome||l.area}</span></div>
    <button onClick={e=>{e.stopPropagation();onDel(l.id);}} style={{background:"none",border:"none",color:"var(--text-sec)",cursor:"pointer"}}><Ic d={IC.tr} s={13} c="#8A8279"/></button></div>
    <div style={{display:"flex",gap:10,marginTop:8,fontSize:11,color:"var(--text-sec)",fontFamily:"'Segoe UI',sans-serif"}}><span>{l.nA} artigos</span><span>{l.nD} dispositivos</span><span>{l.data}</span></div>
  </div>)}</div>}
</div>;}

// ═══ READER ═══
function Reader({lei,area,gSt,uSt,apiKey,saveKey,addAnexo,delAnexo,study}){
  const [tab,setTab]=useState("texto");const [saved,setSaved]=useState(false);const [goSearch,setGoSearch]=useState("");
  const tabs=[{id:"sumario",lb:"Sumário"},{id:"texto",lb:"Texto Integral"},{id:"artigos",lb:"Artigos"},{id:"estudo",lb:"Estudo Guiado"},{id:"remissoes",lb:"Remissões"},{id:"prazos",lb:"Prazos/Valores"},{id:"indice",lb:"Índice"},{id:"mapa",lb:"Mapa"},{id:"anexos",lb:`Anexos (${(lei.anexos||[]).length})`},{id:"teia",lb:"🕸 Teia"},{id:"tutor",lb:"Tutor IA"}];
  const ds=lei.ds;
  const showSaved=()=>{setSaved(true);setTimeout(()=>setSaved(false),1500);};
  const wrappedUSt=(a,b,c,d)=>{uSt(a,b,c,d);showSaved();};

  const buildRecursiveChain = (startId) => {
    const chain = [];
    const visited = new Set();
    let currentId = startId;
    const re = /(?:§\s*\d+[ºo°]?\s+d[oe]\s+)?(?:arts?\.\s*)(\d+[ºo°]?(?:\s*(?:,|e|a)\s*\d+[ºo°]?)*)/gi;

    while (currentId && !visited.has(currentId)) {
      visited.add(currentId);
      const cleanId = currentId.replace(/^Art\.\s*/i, "").trim();
      const device = ds.find(d => d.tipo === "ARTIGO" && d.id.includes(cleanId));
      
      if (!device) break;
      
      const fullText = (device.rub || "") + " " + (device.txt || "");
      re.lastIndex = 0;
      const match = re.exec(fullText);
      const refs = match ? (match[1].match(/\d+[ºo°]?/g) || []).map(r => "Art. " + r) : [];
      
      chain.push({ id: device.id, text: fullText.trim(), refs });
      currentId = refs.length > 0 ? refs[0] : null;
    }
    return chain;
  };

  const exportXlsx=()=>{try{const wb=XLSX.utils.book_new();
    // Texto Integral
    const txData=[["#","Tipo","Identificador","Rubrica","Texto","Status Legal","Alteração"],...ds.map((d,i)=>[i+1,d.tipo,d.id,d.rub,d.txt,d.status||"vigente",d.alteracao||""])];
    const wsTx=XLSX.utils.aoa_to_sheet(txData);
    wsTx["!cols"]=[{wch:6},{wch:14},{wch:18},{wch:40},{wch:80},{wch:12},{wch:50}];
    XLSX.utils.book_append_sheet(wb,wsTx,"Texto Integral");
    // Estudo Guiado
    const ctx=hierarquia(ds);let art="";const estData=[["Localização","Artigo","Dispositivo","Texto","Status Estudo","Dificuldade","Anotação","Status Legal"]];
    for(let i=0;i<ds.length;i++){const d=ds[i];if(d.tipo==="ARTIGO")art=d.id;if(!DIV.has(d.tipo))estData.push([ctx[art]||"",art,d.id,d.txt,gSt(lei.id,i,"status"),gSt(lei.id,i,"dif"),gSt(lei.id,i,"note"),d.status||"vigente"]);}
    const wsEst=XLSX.utils.aoa_to_sheet(estData);
    wsEst["!cols"]=[{wch:40},{wch:12},{wch:18},{wch:70},{wch:14},{wch:14},{wch:40},{wch:12}];
    XLSX.utils.book_append_sheet(wb,wsEst,"Estudo Guiado");
    
    // Teia
    const teiaData = [["Artigo Origem", "Caminho da Teia (Texto Integral)"]];
    const artigos = ds.filter(d => d.tipo === "ARTIGO");
    artigos.forEach(a => {
      const chain = buildRecursiveChain(a.id);
      if (chain.length > 1) {
        const pathText = chain.map(c => `[${c.id}]\n${c.text}`).join("\n\n↓\n\n");
        teiaData.push([a.id, pathText]);
      }
    });
    const wsTeia=XLSX.utils.aoa_to_sheet(teiaData);
    wsTeia["!cols"]=[{wch:16},{wch:100}];
    XLSX.utils.book_append_sheet(wb,wsTeia,"Teia de Remissões");

    // Remissões
    const rem=extrairRemissoes(ds);const remData=[["#","Origem","Dispositivo","Referência","Contexto"],...rem.map((r,i)=>[i+1,r.origem,r.disp,r.destino,r.ctx])];
    const wsRem=XLSX.utils.aoa_to_sheet(remData);
    wsRem["!cols"]=[{wch:6},{wch:14},{wch:18},{wch:14},{wch:80}];
    XLSX.utils.book_append_sheet(wb,wsRem,"Remissões");
    // Prazos e Valores
    const pv=extrairPrazosValores(ds);const pvData=[["#","Tipo","Conteúdo","Artigo","Capítulo","Contexto"],...pv.map((r,i)=>[i+1,r.tipo,r.val,r.art,r.cap,r.ctx])];
    const wsPv=XLSX.utils.aoa_to_sheet(pvData);
    wsPv["!cols"]=[{wch:6},{wch:18},{wch:22},{wch:12},{wch:35},{wch:80}];
    XLSX.utils.book_append_sheet(wb,wsPv,"Prazos e Valores");
    // Índice Remissivo
    const idx=buildIdx(ds,area);const idxData=[["Palavra-chave","Artigos","Qtd"],...Object.entries(idx).map(([p,a])=>[p,a.join(", "),a.length])];
    const wsIdx=XLSX.utils.aoa_to_sheet(idxData);
    wsIdx["!cols"]=[{wch:25},{wch:80},{wch:8}];
    XLSX.utils.book_append_sheet(wb,wsIdx,"Índice Remissivo");
    XLSX.writeFile(wb,lei.nome+"_TERA.xlsx");}catch(e){alert("Erro ao exportar: "+e.message);}};

  return <div className="fade">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
      <div><h2 style={{fontSize:17,fontWeight:700}}>{lei.nome}</h2><div style={{fontSize:12,color:"var(--text-sec)",fontFamily:"'Segoe UI',sans-serif"}}>{lei.nD} dispositivos · {lei.nA} artigos · {(lei.anexos||[]).length} anexos · {AREAS[area]?.nome}</div></div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        {saved&&<span style={{fontSize:12,color:"var(--ok)",fontWeight:600,animation:"fadeIn .2s"}}>Salvo!</span>}
        <button onClick={exportXlsx} style={{display:"flex",alignItems:"center",gap:4,padding:"6px 14px",background:"var(--grad)",color:"#fff",border:"none",borderRadius:6,fontSize:12,fontWeight:600,cursor:"pointer"}}>Exportar Excel</button>
      </div>
    </div>
    <div style={{display:"flex",gap:0,borderBottom:"1px solid var(--border)",marginBottom:14,overflowX:"auto"}}>{tabs.map(t=><button key={t.id} className={`stab ${tab===t.id?"on":""}`} onClick={()=>setTab(t.id)}>{t.lb}</button>)}</div>
    {tab==="sumario"&&<TabSumario ds={ds}/>}
    {tab==="texto"&&<TabTexto ds={ds} lei={lei} gSt={gSt} uSt={wrappedUSt} initialSearch={goSearch}/>}
    {tab==="artigos"&&<TabArtigos ds={ds}/>}
    {tab==="estudo"&&<TabEstudo ds={ds} lei={lei} gSt={gSt} uSt={wrappedUSt}/>}
    {tab==="remissoes"&&<TabRemissoes ds={ds}/>}
    {tab==="teia"&&<TabTeia ds={ds} buildRecursiveChain={buildRecursiveChain}/>}
    {tab==="prazos"&&<TabPrazos ds={ds}/>}
    {tab==="indice"&&<TabIndice ds={ds} area={area} onGoToArt={a=>{setGoSearch(a);setTab("texto");}}/>}
    {tab==="mapa"&&<TabMapa ds={ds}/>}
    {tab==="anexos"&&<TabAnexos lei={lei} addAnexo={addAnexo} delAnexo={delAnexo}/>}
    {tab==="tutor"&&<TabTutor lei={lei} area={area} apiKey={apiKey} saveKey={saveKey}/>}
  </div>;
}

function TabSumario({ds}){const items=ds.filter(d=>DIV.has(d.tipo));return <div style={{maxHeight:"70vh",overflow:"auto"}}><table className="dt"><thead><tr><th>#</th><th>Tipo</th><th>Identificador</th><th>Rubrica</th></tr></thead><tbody>{items.map((d,i)=><tr key={i} style={{background:CT[d.tipo]||"#fff",color:d.tipo==="PARTE"||d.tipo==="LIVRO"||d.tipo==="TÍTULO"||d.tipo==="CAPÍTULO"?"#fff":"#2D2A26"}}><td>{i+1}</td><td><span className="badge" style={{background:"rgba(0,0,0,.15)",color:"inherit"}}>{d.tipo}</span></td><td style={{fontWeight:700}}>{d.id}</td><td>{d.rub}</td></tr>)}</tbody></table></div>;}

function TabTexto({ds,lei,gSt,uSt,initialSearch}){const [srch,setSrch]=useState(initialSearch||"");useEffect(()=>{if(initialSearch)setSrch(initialSearch);},[initialSearch]);const fd=useMemo(()=>srch?ds.filter(d=>(d.txt+d.id+d.rub).toLowerCase().includes(srch.toLowerCase())):ds,[ds,srch]);
  const ind={PARTE:0,LIVRO:0,TÍTULO:0,CAPÍTULO:12,SEÇÃO:24,SUBSEÇÃO:36,ARTIGO:0,PARÁGRAFO:20,INCISO:36,ALÍNEA:52,ITEM:68};
  const sts=["","Não lido","Lido","Revisando","Dominado","Dúvida"];const sC={Dominado:"#27AE60",Dúvida:"#C0392B",Revisando:"#D4A017",Lido:"#2E86AB"};
  return <div><div style={{marginBottom:10}}><input value={srch} onChange={e=>setSrch(e.target.value)} placeholder="Buscar na lei..." style={{width:"100%",maxWidth:"100%",background:"var(--bg-hover)",border:"1px solid var(--border)",borderRadius:6,padding:"10px 14px",fontSize:14,boxSizing:"border-box"}}/></div>
    <div style={{maxHeight:"68vh",overflow:"auto",border:"1px solid var(--border)",borderRadius:8}}>{fd.map((d,i)=>{const ri=ds.indexOf(d);const isD=DIV.has(d.tipo);const st=gSt(lei.id,ri,"status");const nt=gSt(lei.id,ri,"note");const isVetado=d.status==="vetado";const isRevogado=d.status==="revogado";
      return <div key={ri} style={{display:"flex",borderBottom:"1px solid var(--border)",background:isVetado?"rgba(231,76,60,0.06)":isRevogado?"rgba(231,76,60,0.04)":isD?CT[d.tipo]||"#F5EDDF":ri%2===0?"#fff":"#FAF7F2",paddingLeft:ind[d.tipo]||0}}>
        <div style={{minWidth:70,padding:"6px 4px",textAlign:"center"}}>
          <span className="badge" style={{background:isD?"rgba(0,0,0,.1)":"#F3EDE4",color:isD?(d.tipo==="PARTE"||d.tipo==="LIVRO"||d.tipo==="TÍTULO"||d.tipo==="CAPÍTULO"?"#fff":"#5C554A"):"#8A8279"}}>{d.tipo}</span>
          {isVetado&&<div><span className="badge badge-revogado" style={{marginTop:3,display:"inline-block"}}>VETADO</span></div>}
          {isRevogado&&<div><span className="badge badge-revogado" style={{marginTop:3,display:"inline-block"}}>REVOGADO</span></div>}
        </div>
        <div style={{flex:1,padding:"6px 8px",fontSize:12.5,lineHeight:1.6,color:isD?(d.tipo==="PARTE"||d.tipo==="LIVRO"||d.tipo==="TÍTULO"?"#fff":"#2D2A26"):"#2D2A26",fontWeight:isD||d.tipo==="ARTIGO"?600:400,textDecoration:(isVetado||isRevogado)?"line-through":"none",opacity:(isVetado||isRevogado)?0.6:1}}>
          <span style={{color:isD?"inherit":"#B8965A",fontFamily:"'Segoe UI',sans-serif",fontSize:12,marginRight:4,textDecoration:"none"}}>{d.id}</span>
          {d.rub&&<i style={{opacity:.7}}>{d.rub} </i>}{d.txt}
          {d.alteracao&&<div style={{marginTop:3,padding:"2px 8px",background:"rgba(52,152,219,0.08)",borderLeft:"2px solid #3498db",borderRadius:3,fontSize:11,color:"#3498db",textDecoration:"none",fontWeight:400,opacity:1}}>↳ {d.alteracao}</div>}
          {nt&&<div style={{marginTop:3,padding:"2px 6px",background:"var(--gold-subtle)",borderLeft:"2px solid #B8965A",borderRadius:3,fontSize:11,color:"var(--gold)",textDecoration:"none",fontWeight:400,opacity:1}}>{nt}</div>}
        </div>
        {!isD&&<div style={{minWidth:100,padding:"5px 4px",display:"flex",flexDirection:"column",gap:3}}>
          <select value={st} onChange={e=>uSt(lei.id,ri,"status",e.target.value)} style={{background:"var(--bg-hover)",border:"1px solid var(--border)",borderRadius:3,color:sC[st]||"#8A8279",padding:"2px",fontSize:11,cursor:"pointer"}}>{sts.map(s=><option key={s} value={s}>{s||"Status"}</option>)}</select>

function TabTeia({ds, buildRecursiveChain}){

  const arts = useMemo(() => ds.filter(d => d.tipo === "ARTIGO").map(d => d.id), [ds]);

  const tracar = () => {
    if (!startArt) return;
    const c = buildRecursiveChain(startArt);
    setChain(c);
    setTraced(true);
  };

  return <div style={{display:"flex",gap:16,height:"70vh"}}>
    <div style={{width:250,display:"flex",flexDirection:"column",gap:10}}>
      <div style={{fontSize:13,fontWeight:700,color:"var(--gold)"}}>TRAÇAR CAMINHO</div>

        <option value="">Selecione o Artigo...</option>

      </select>

      <div style={{fontSize:11,color:"var(--text-sec)",lineHeight:1.4}}>A teia seguirá automaticamente a primeira remissão encontrada em cada dispositivo até o fim da cadeia.</div>
    </div>
    <div style={{flex:1,overflow:"auto",padding:"10px",background:"var(--bg-hover)",borderRadius:12,border:"1px solid var(--border)"}}>
      {!traced ? <div style={{textAlign:"center",paddingTop:100,color:"var(--text-sec)"}}>Selecione um artigo para ver a teia de aranha das remissões.</div>
      : chain.length === 0 ? <div style={{textAlign:"center",paddingTop:100}}>Nenhum caminho encontrado.</div>
      : <div style={{display:"flex",flexDirection:"column",gap:20}}>
          {chain.map((node, i) => (

                {node.refs.length > 1 && <div style={{marginTop:10,fontSize:11,color:"var(--text-sec)"}}>Também cita: {node.refs.slice(1).join(", ")}</div>}
              </div>

            </div>
          ))}
        </div>
      }
    </div>

}

    const parts=text.split(re);
    return parts.map((p,i)=>re.test(p)?React.createElement("mark",{key:i,style:{background:"rgba(212,168,83,0.35)",padding:"0 1px",borderRadius:2}},p):p);
  };

  return <div>
    <div style={{marginBottom:12}}>
      <input value={filtro} onChange={e=>setFiltro(e.target.value)} placeholder="Buscar qualquer palavra (mínimo 3 caracteres)..." style={{width:"100%",maxWidth:"100%",background:"var(--bg-hover)",border:"1px solid var(--border)",borderRadius:6,padding:"10px 14px",fontSize:14,boxSizing:"border-box"}}/>
      {buscaAtiva&&<div style={{marginTop:6,fontSize:12,color:"var(--text-sec)"}}>{totalOcorrencias} ocorrência(s) em {resultadosBusca.length} dispositivo(s)</div>}

            <td style={{fontSize:12,fontWeight:600}}>{r.id}</td>
            <td style={{color:"var(--gold)",fontWeight:600}}>{r.art}</td>
            <td style={{fontSize:12,lineHeight:1.5}}>{highlightText((r.txt||"").slice(0,300)+(r.txt?.length>300?"...":""),filtro)}</td>
            <td style={{fontWeight:700,textAlign:"center",color:"var(--gold)"}}>{r.ocorrencias}</td>

        )}</tbody></table>
      </div>)

        </div>

    </div>}
  </div>;

function TabMapa({ds}){const estrutura=useMemo(()=>{const mapa=[];let tituloAtual=null;let capAtual=null;let secAtual=null;
  for(const d of ds){
    if(d.tipo==="PARTE"||d.tipo==="LIVRO"){mapa.push({tipo:d.tipo,id:d.id,rub:d.rub,caps:[],artigos:[]});tituloAtual=null;capAtual=null;secAtual=null;}
    else if(d.tipo==="TÍTULO"){const t={tipo:"TÍTULO",id:d.id,rub:d.rub,caps:[],artigos:[]};if(mapa.length>0&&(mapa[mapa.length-1].tipo==="PARTE"||mapa[mapa.length-1].tipo==="LIVRO")){mapa[mapa.length-1].caps.push(t);}else{mapa.push(t);}tituloAtual=t;capAtual=null;secAtual=null;}
    else if(d.tipo==="CAPÍTULO"){const c={tipo:"CAPÍTULO",id:d.id,rub:d.rub,secs:[],artigos:[]};if(tituloAtual){tituloAtual.caps.push(c);}else{mapa.push(c);}capAtual=c;secAtual=null;}
    else if(d.tipo==="SEÇÃO"){const s={tipo:"SEÇÃO",id:d.id,rub:d.rub,artigos:[]};if(capAtual){capAtual.secs.push(s);}else if(tituloAtual){tituloAtual.caps.push(s);}secAtual=s;}
    else if(d.tipo==="SUBSEÇÃO"){/* agrupado dentro da seção corrente */}
    else if(d.tipo==="ARTIGO"){const art=d.id;if(secAtual){secAtual.artigos.push(art);}else if(capAtual){capAtual.artigos.push(art);}else if(tituloAtual){tituloAtual.artigos.push(art);}}}
  return mapa;},[ds]);

  const renderArtigos=(arts)=>arts.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>{arts.map(a=><span key={a} style={{background:"var(--gold-subtle)",color:"var(--gold)",padding:"2px 8px",borderRadius:4,fontSize:11}}>{a}</span>)}</div>;

  const renderSec=(s,i)=><div key={i} style={{marginLeft:16,marginTop:6,padding:"6px 10px",borderLeft:"2px solid var(--border)",background:"var(--bg-hover)",borderRadius:"0 6px 6px 0"}}>
    <div style={{fontSize:12,color:"var(--text-sec)"}}><b style={{color:"var(--gold)"}}>{s.id}</b> — {s.rub}</div>
    {renderArtigos(s.artigos)}
  </div>;

  const renderCap=(c,i)=><div key={i} style={{marginLeft:8,marginTop:8,padding:"8px 12px",background:"var(--bg-hover)",borderRadius:8,border:"1px solid var(--border)"}}>
    <div style={{fontSize:13,fontWeight:600}}><span style={{color:"var(--gold)"}}>{c.id}</span> — {c.rub}</div>
    {renderArtigos(c.artigos)}
    {c.secs&&c.secs.map(renderSec)}
  </div>;

  return <div style={{display:"flex",flexDirection:"column",gap:12,maxHeight:"70vh",overflow:"auto"}}>{estrutura.map((t,i)=>
    <div key={i} className="cd" style={{padding:14}}>
      <div style={{fontWeight:700,fontSize:14,color:"var(--gold)",marginBottom:2}}>{t.id}</div>
      <div style={{fontSize:13,color:"var(--text-sec)",marginBottom:6}}>{t.rub}</div>
      {renderArtigos(t.artigos)}
      {t.caps&&t.caps.map(renderCap)}
    </div>
  )}</div>;
}

function TabTutor({lei,area,apiKey,saveKey}){const [msgs,setMsgs]=useState([]);const [inp,setInp]=useState("");const [ld,setLd]=useState(false);const [localKey,setLocalKey]=useState(apiKey);const cr=useRef(null);
  useEffect(()=>{cr.current&&(cr.current.scrollTop=cr.current.scrollHeight);},[msgs]);
  const send=async()=>{if(!inp.trim()||ld||!apiKey)return;const m=inp.trim();setInp("");setMsgs(p=>[...p,{role:"user",text:m}]);setLd(true);
    try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1024,system:`Você é o TERA Tutor especialista em ${AREAS[area]?.nome}. Lei: ${lei.nome}.`,messages:[{role:"user",content:m}]})});
      const d=await r.json();setMsgs(p=>[...p,{role:"assistant",text:d.content?.[0]?.text||"Erro."}]);}catch(e){setMsgs(p=>[...p,{role:"assistant",text:"Erro: "+e.message}]);}setLd(false);};
  if(!apiKey)return <div className="cd" style={{padding:20}}><div style={{fontWeight:700,marginBottom:10}}>Configurar API Key</div><input value={localKey} onChange={e=>setLocalKey(e.target.value)} placeholder="sk-ant-..." style={{width:"100%",padding:10,marginBottom:10}}/><button onClick={()=>saveKey(localKey)} className="btn-primary">Salvar</button></div>;
  return <div style={{display:"flex",flexDirection:"column",height:"60vh"}}>
    <div ref={cr} style={{flex:1,overflowY:"auto",padding:10}}>{msgs.map((m,i)=><div key={i} style={{marginBottom:10,textAlign:m.role==="user"?"right":"left"}}><div style={{display:"inline-block",padding:10,borderRadius:10,background:m.role==="user"?"var(--grad)":"var(--bg-hover)",color:m.role==="user"?"#fff":"var(--text)"}}>{m.text}</div></div>)}</div>
    <div style={{display:"flex",gap:10}}><input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} style={{flex:1,padding:10}}/><button onClick={send} className="btn-primary">Enviar</button></div>
  </div>;
}

  {n:"Lei nº 10.637/2002",d:"PIS não cumulativo. Regime vigente durante a transição, com redução gradual de alíquotas a partir de 2027.",url:"https://www.planalto.gov.br/ccivil_03/leis/2002/l10637.htm"},
  {n:"Lei nº 10.833/2003",d:"COFINS não cumulativa. Regime vigente durante a transição, com redução gradual de alíquotas a partir de 2027.",url:"https://www.planalto.gov.br/ccivil_03/leis/2003/l10.833.htm"},
  {n:"Lei nº 9.718/1998",d:"PIS/COFINS cumulativo. Regime vigente durante a transição para os contribuintes não sujeitos à não cumulatividade.",url:"https://www.planalto.gov.br/ccivil_03/leis/l9718.htm"},
];
function Ref({apiKey,saveKey}){const [sub,setSub]=useState("leg");const [tMsgs,setTMsgs]=useState([]);const [tInp,setTInp]=useState("");const [tLd,setTLd]=useState(false);const [localKey,setLocalKey]=useState(apiKey);const cr=useRef(null);const subs=[{id:"leg",lb:"Legislação"},{id:"timeline",lb:"Timeline Transição"},{id:"tutor",lb:"Tutor Reforma"}];
  const TIMELINE=[{ano:"2023",ev:"EC 132/2023 promulgada",det:"Aprovação da Emenda Constitucional da Reforma Tributária.",fonte:"Planalto",url:"https://www.planalto.gov.br/ccivil_03/constituicao/emendas/emc/emc132.htm"},{ano:"2025",ev:"LC 214/2025 publicada",det:"Regulamentação do IBS, CBS e Imposto Seletivo.",fonte:"Planalto",url:"https://www.planalto.gov.br/ccivil_03/leis/lcp/Lcp214.htm"},{ano:"2026",ev:"Início do período de teste",det:"CBS a 0,9% e IBS a 0,1% (alíquota-teste). PIS/COFINS mantidos integralmente.",fonte:"EC 132/2023, art. 125"},{ano:"2027",ev:"CBS substituindo PIS/COFINS",det:"CBS em vigor com alíquota de referência. PIS e COFINS extintos.",fonte:"EC 132/2023, art. 125, §1º"},{ano:"2029-2032",ev:"Transição gradual ICMS/ISS → IBS",det:"Redução progressiva de ICMS e ISS: 90% em 2029, 80% em 2030, 70% em 2031, 60% em 2032.",fonte:"EC 132/2023, art. 125, §§3º-5º"},{ano:"2033",ev:"Plena vigência",det:"IBS em alíquota plena. ICMS e ISS extintos. Sistema dual CBS+IBS consolidado.",fonte:"EC 132/2023, art. 125, §6º"}];
  const sendT=async()=>{if(!tInp.trim()||tLd||!apiKey)return;const m=tInp.trim();setTInp("");setTMsgs(p=>[...p,{role:"user",text:m}]);setTLd(true);try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1024,system:"Você é o TERA Tutor especialista em Reforma Tributária brasileira (EC 132/2023, LC 214/2025). Responda sobre IBS, CBS, Imposto Seletivo, split payment, não cumulatividade, transição, cashback.",messages:[{role:"user",content:m}]})});const d=await r.json();setTMsgs(p=>[...p,{role:"assistant",text:d.content?.[0]?.text||"Erro."}]);}catch(e){setTMsgs(p=>[...p,{role:"assistant",text:"Erro: "+e.message}]);}setTLd(false);};
  useEffect(()=>{cr.current&&(cr.current.scrollTop=cr.current.scrollHeight);},[tMsgs]);
  return <div className="fade"><h2 style={{fontSize:20,fontWeight:700,marginBottom:12}}>Reforma Tributária</h2>
    <div style={{display:"flex",gap:0,borderBottom:"1px solid var(--border)",marginBottom:14}}>{subs.map(s=><button key={s.id} className={`stab ${sub===s.id?"on":""}`} onClick={()=>setSub(s.id)}>{s.lb}</button>)}</div>
    {sub==="leg"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>{REFORMA.map((r,i)=><div key={i} className="cd" style={{padding:14,cursor:r.url?"pointer":"default"}} onClick={()=>{if(r.url)window.open(r.url,"_blank");}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><b>{r.n}</b>{r.url&&<span style={{fontSize:11,color:"var(--gold)",display:"flex",alignItems:"center",gap:3}}><Ic d={IC.lk} s={11} c="var(--gold)"/>Abrir</span>}</div><p style={{fontSize:13,color:"var(--text-sec)",marginTop:4}}>{r.d}</p></div>)}</div>}
    {sub==="timeline"&&<div>
      <div style={{background:"var(--gold-subtle)",border:"1px solid var(--gold)",borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>Fontes: EC 132/2023, LC 214/2025 — Dados extraídos da legislação vigente publicada no Planalto.</span>
        <a href="https://www.planalto.gov.br/ccivil_03/constituicao/emendas/emc/emc132.htm" target="_blank" style={{fontSize:11,color:"var(--gold)",whiteSpace:"nowrap",marginLeft:8}}>Verificar fonte</a>
      </div>
      <div style={{position:"relative",paddingLeft:30}}>{TIMELINE.map((t,i)=><div key={i} style={{position:"relative",marginBottom:20,paddingLeft:20}}>
      <div style={{position:"absolute",left:-30,top:0,width:20,height:20,borderRadius:"50%",background:"var(--grad)",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:8,height:8,borderRadius:"50%",background:"#fff"}}></div></div>
      {i<TIMELINE.length-1&&<div style={{position:"absolute",left:-21,top:20,width:2,height:"calc(100% + 4px)",background:"var(--border)"}}></div>}
      <div className="cd" style={{padding:14,cursor:t.url?"pointer":"default"}} onClick={()=>{if(t.url)window.open(t.url,"_blank");}}>
        <div style={{fontWeight:700,color:"var(--gold)",fontSize:15}}>{t.ano}</div>
        <div style={{fontWeight:600,marginTop:4}}>{t.ev}</div>
        <div style={{fontSize:13,color:"var(--text-sec)",marginTop:4}}>{t.det}</div>
        <div style={{fontSize:11,color:"var(--text-mute)",marginTop:6,fontStyle:"italic"}}>Fonte: {t.fonte}{t.url&&<> · <a href={t.url} target="_blank" onClick={e=>e.stopPropagation()} style={{color:"var(--gold)"}}>ver legislação</a></>}</div>
      </div>
    </div>)}</div></div>}
    {sub==="tutor"&&(!apiKey?<div className="cd" style={{padding:20}}><div style={{fontWeight:700,marginBottom:10}}>Configurar API Key</div><input value={localKey} onChange={e=>setLocalKey(e.target.value)} placeholder="sk-ant-..." style={{width:"100%",padding:10,marginBottom:10,borderRadius:6}}/><button onClick={()=>saveKey(localKey)} className="btn-primary">Salvar</button></div>
    :<div style={{display:"flex",flexDirection:"column",height:"60vh"}}>
      <div ref={cr} style={{flex:1,overflowY:"auto",padding:10}}>{tMsgs.length===0&&<div style={{textAlign:"center",padding:40,color:"var(--text-sec)"}}>Pergunte sobre a Reforma Tributária, IBS, CBS, Imposto Seletivo...</div>}{tMsgs.map((m,i)=><div key={i} style={{marginBottom:10,textAlign:m.role==="user"?"right":"left"}}><div style={{display:"inline-block",padding:10,borderRadius:10,maxWidth:"80%",background:m.role==="user"?"var(--grad)":"var(--bg-hover)",color:m.role==="user"?"#fff":"var(--text)",whiteSpace:"pre-wrap"}}>{m.text}</div></div>)}</div>
      <div style={{display:"flex",gap:10}}><input value={tInp} onChange={e=>setTInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendT()} placeholder="Pergunte sobre a Reforma..." style={{flex:1,padding:10,borderRadius:6}}/><button onClick={sendT} className="btn-primary" disabled={tLd}>{tLd?<Sp/>:"Enviar"}</button></div>
    </div>)}
  </div>;
}

// ═══ ATUALIZAÇÕES ═══
const PORTAIS=[
  {id:"rfb",nome:"RFB Reforma",cor:"#2e86ab"},
  {id:"nfe",nome:"NFe/NFCe",cor:"#27ae60"},
  {id:"dou",nome:"Diário Oficial",cor:"#d4a017"}
];
const DATA_URL="data/atualizacoes.json";

function Atl({apiKey,saveKey}){
  const [itens,setItens]=useState(()=>LS("t3-upd-v2")||[]);
  const [ultimaAtt,setUltimaAtt]=useState(()=>LS("t3-upd-dt")||"");
  const [ld,setLd]=useState(false);
  const [filtro,setFiltro]=useState("");
  const [filtroPortal,setFiltroPortal]=useState("");
  const [filtroData,setFiltroData]=useState("");
  const [erro,setErro]=useState("");

  const buscar=async()=>{setLd(true);setErro("");
    try{
      const r=await fetch(DATA_URL+"?t="+Date.now());
      if(!r.ok)throw new Error("Arquivo de atualizações não encontrado ("+r.status+"). Execute o workflow do GitHub Actions ou aguarde a próxima atualização automática.");
      const data=await r.json();
      if(data.itens&&Array.isArray(data.itens)){
        // Mesclar com itens existentes (evitar duplicatas por link)
        const linksExist=new Set(itens.map(i=>i.link));
        const novos=data.itens.filter(i=>!linksExist.has(i.link));
        const merged=[...novos,...itens].sort((a,b)=>b.data.localeCompare(a.data));
        setItens(merged);LS("t3-upd-v2",merged);
        setUltimaAtt(data.ultima_atualizacao||new Date().toISOString());
        LS("t3-upd-dt",data.ultima_atualizacao||new Date().toISOString());
      }else{setErro("Formato de dados inesperado no arquivo JSON.");}
    }catch(e){setErro(e.message);}setLd(false);};

  const exportar=()=>{try{
    const data={ultima_atualizacao:ultimaAtt,itens:itensFiltrados,exportDate:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");
    a.href=url;a.download="TERA_atualizacoes_"+new Date().toISOString().slice(0,10)+".json";
    a.click();URL.revokeObjectURL(url);
  }catch(e){alert("Erro ao exportar: "+e.message);}};

  const limpar=()=>{if(confirm("Tem certeza que deseja limpar todo o histórico de atualizações?")){setItens([]);setUltimaAtt("");LS("t3-upd-v2",null);LS("t3-upd-dt",null);}};

  const itensFiltrados=useMemo(()=>{
    let f=itens;
    if(filtroPortal)f=f.filter(i=>i.portal===filtroPortal);
    if(filtroData)f=f.filter(i=>i.data===filtroData);
    if(filtro.trim()){const term=filtro.toLowerCase();f=f.filter(i=>(i.titulo||"").toLowerCase().includes(term)||(i.resumo||"").toLowerCase().includes(term)||(i.portal||"").toLowerCase().includes(term));}
    return f;
  },[itens,filtroPortal,filtroData,filtro]);

  const datasUnicas=useMemo(()=>[...new Set(itens.map(i=>i.data))].sort().reverse(),[itens]);
  const portalCor=(portal)=>PORTAIS.find(p=>p.nome===portal||p.id===portal)?.cor||"var(--text-sec)";

  return <div className="fade">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
      <div><h2 style={{margin:0}}>Atualizações</h2>
        {ultimaAtt&&<div style={{fontSize:11,color:"var(--text-sec)",marginTop:2}}>Última atualização do servidor: {new Date(ultimaAtt).toLocaleString("pt-BR")}</div>}
        <div style={{fontSize:11,color:"var(--text-mute)",marginTop:1}}>Atualização automática: seg-sex às 09:00 (GitHub Actions)</div>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        <button onClick={buscar} className="btn-primary" disabled={ld}>{ld?<><Sp/> Buscando...</>:"Buscar Agora"}</button>
        {itens.length>0&&<><button onClick={exportar} className="btn-secondary" style={{fontSize:12,padding:"8px 12px"}}>Exportar</button>
        <button onClick={limpar} className="btn-secondary" style={{fontSize:12,padding:"8px 12px",color:"var(--err)"}}>Limpar Histórico</button></>}
      </div>
    </div>
    {erro&&<div style={{background:"rgba(231,76,60,0.1)",border:"1px solid #e74c3c",borderRadius:8,padding:"10px 14px",marginBottom:10,fontSize:13,color:"#e74c3c"}}>{erro}</div>}
    {itens.length>0&&<div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
      <input value={filtro} onChange={e=>setFiltro(e.target.value)} placeholder="Filtrar por nome ou texto..." style={{flex:"1 1 200px",padding:"8px 12px",borderRadius:6,fontSize:13,background:"var(--bg-hover)",border:"1px solid var(--border)"}}/>
      <select value={filtroPortal} onChange={e=>setFiltroPortal(e.target.value)} style={{padding:"8px",borderRadius:6,fontSize:12}}>
        <option value="">Todos os portais</option>
        {PORTAIS.map(p=><option key={p.id} value={p.nome}>{p.nome}</option>)}
      </select>
      <select value={filtroData} onChange={e=>setFiltroData(e.target.value)} style={{padding:"8px",borderRadius:6,fontSize:12}}>
        <option value="">Todas as datas</option>
        {datasUnicas.map(d=><option key={d} value={d}>{d}</option>)}
      </select>
      <span style={{fontSize:12,color:"var(--text-sec)"}}>{itensFiltrados.length} de {itens.length}</span>
    </div>}
    {itens.length===0?<div style={{textAlign:"center",padding:40,color:"var(--text-sec)"}}>
      <div style={{fontSize:16,marginBottom:8}}>Nenhuma atualização carregada</div>
      <div style={{fontSize:13,lineHeight:1.6}}>Clique em "Buscar Agora" para carregar as atualizações do servidor.<br/>As atualizações são geradas automaticamente de seg-sex às 09:00 por um script Python no GitHub Actions que consulta:<br/>
        <a href="https://www.gov.br/receitafederal/pt-br/acesso-a-informacao/acoes-e-programas/programas-e-atividades/reforma-consumo/noticias" target="_blank">RFB Reforma</a> · <a href="https://www.nfe.fazenda.gov.br/portal/listaConteudo.aspx?tipoConteudo=04BIflQt1aY=" target="_blank">NFe</a> · <a href="https://in.gov.br/leiturajornal" target="_blank">DOU</a>
      </div>
    </div>
    :<div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:"65vh",overflow:"auto"}}>{itensFiltrados.map((item,i)=>
      <div key={i} className="cd" style={{padding:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
          <div>
            <span className="badge" style={{background:portalCor(item.portal)+"22",color:portalCor(item.portal),marginRight:8}}>{item.portal}</span>
            <span style={{fontSize:11,color:"var(--text-sec)"}}>{item.data}</span>
          </div>
          {item.link&&<a href={item.link} target="_blank" onClick={e=>e.stopPropagation()} style={{fontSize:11,color:"var(--gold)",display:"flex",alignItems:"center",gap:3,whiteSpace:"nowrap"}}><Ic d={IC.lk} s={10} c="var(--gold)"/>Abrir</a>}
        </div>
        <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>{item.titulo}</div>
        {item.resumo&&<div style={{fontSize:12,color:"var(--text-sec)",lineHeight:1.5}}>{item.resumo}</div>}
      </div>
    )}</div>}
  </div>;
}

ReactDOM.render(<ErrorBoundary><App/></ErrorBoundary>,document.getElementById("root"));
</script>
</body>
</html>
