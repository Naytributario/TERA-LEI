const {useState,useEffect,useRef,useMemo,useCallback}=React;
const P={bg:"#FAF7F2",bgAlt:"#F3EDE4",bgCard:"#fff",border:"#E8DFD0",gold:"#B8965A",goldDark:"#8C6D3F",goldLight:"#D4B882",text:"#2D2A26",textMid:"#5C554A",textLight:"#8A8279",accentBg:"#F5EDDF",danger:"#C0392B",success:"#27AE60",info:"#2E86AB",warn:"#D4A017"};
const AREAS={tributario:{nome:"Tributário",palavras:["microempresa","empresa de pequeno porte","simples nacional","receita bruta","alíquota","base de cálculo","fato gerador","contribuinte","sujeito passivo","obrigação tributária","crédito tributário","lançamento","isenção","imunidade","prescrição","decadência","compensação","multa","juros","mora","ICMS","ISS","IPI","PIS","COFINS","IRPJ","CSLL","INSS","nota fiscal","escrituração","declaração","MEI","parcelamento","certidão negativa","substituição tributária","dívida ativa","execução fiscal","IBS","CBS","imposto seletivo","IVA","não cumulatividade","cashback","split payment","comitê gestor"]},civil:{nome:"Civil",palavras:["capacidade civil","casamento","divórcio","propriedade","posse","usucapião","contrato","obrigação","dano moral","indenização","sucessão","herança","testamento","inventário"]},penal:{nome:"Penal",palavras:["crime","dolo","culpa","pena","reclusão","legítima defesa","tentativa","reincidência","homicídio","furto","roubo","habeas corpus"]},trabalhista:{nome:"Trabalhista",palavras:["empregado","empregador","CLT","salário","horas extras","férias","FGTS","aviso prévio","rescisão","justa causa","terceirização","convenção coletiva"]},constitucional:{nome:"Constitucional",palavras:["direitos fundamentais","liberdade","igualdade","contraditório","ampla defesa","mandado de segurança","dignidade","cláusula pétrea","STF","medida provisória"]},administrativo:{nome:"Administrativo",palavras:["administração pública","servidor público","licitação","pregão","contrato administrativo","concessão","poder de polícia","improbidade","PAD"]}};

// Parser
const PATS=[{t:"TÍTULO",r:/^\s*T[ÍI]TULO\s+(?:[IVXLCDM]+|ÚNICO)\s*$/i},{t:"CAPÍTULO",r:/^\s*CAP[ÍI]TULO\s+(?:[IVXLCDM]+|ÚNICO)\s*$/i},{t:"SEÇÃO",r:/^\s*SE[ÇC][ÃA]O\s+(?:[IVXLCDM]+|ÚNICA)\s*$/i},{t:"SUBSEÇÃO",r:/^\s*SUBSE[ÇC][ÃA]O\s+(?:[IVXLCDM]+|ÚNICA)\s*$/i},{t:"ARTIGO",r:/^\s*Art\.\s*\d+[ºo°]?[\s\-\.]+/},{t:"PARÁGRAFO",r:/^\s*(?:§\s*\d+[ºo°]?\.?\s|Par[áa]grafo\s+[úu]nico\.?\s)/i},{t:"INCISO",r:/^\s*[IVXLCDM]+\s*[\-–—]\s+/},{t:"ALÍNEA",r:/^\s*[a-z]\)\s+/},{t:"ITEM",r:/^\s*\d+\.\s+/}];
const DIV=new Set(["TÍTULO","CAPÍTULO","SEÇÃO","SUBSEÇÃO"]);
const CT={TÍTULO:"#B8965A",CAPÍTULO:"#D4B882",SEÇÃO:"#E8DFD0",SUBSEÇÃO:"#F0E9DE"};

function idT(s){for(const p of PATS)if(p.r.test(s.trim()))return p.t;return null;}
function exId(t,s){s=s.trim();if(DIV.has(t))return s;const R={ARTIGO:/^(Art\.\s*\d+[ºo°]?[\-\.]?)/,PARÁGRAFO:/^(§\s*\d+[ºo°]?\.?|Par[áa]grafo\s+[úu]nico\.?)/i,INCISO:/^([IVXLCDM]+)\s*[\-–—]/,ALÍNEA:/^([a-z]\))/,ITEM:/^(\d+\.)/};const m=R[t]?.exec(s);return m?m[1].trim():s.slice(0,30);}
function exTx(t,s){s=s.trim();if(DIV.has(t))return"";const R={ARTIGO:/^Art\.\s*\d+[ºo°]?[\s\-\.]+(.+)/,PARÁGRAFO:/^(?:§\s*\d+[ºo°]?\.?\s+|Par[áa]grafo\s+[úu]nico\.?\s+)(.+)/i,INCISO:/^[IVXLCDM]+\s*[\-–—]\s+(.+)/,ALÍNEA:/^[a-z]\)\s+(.+)/,ITEM:/^\d+\.\s+(.+)/};const m=R[t]?.exec(s);return m?m[1].trim():s;}
function parse(txt){const ds=[];let a=null,ag=false;for(const l of txt.split("\n")){const s=l.trim();if(!s){if(ag&&a)ag=false;continue;}const t=idT(s);if(t){a={tipo:t,id:exId(t,s),rub:"",txt:exTx(t,s)};ds.push(a);ag=DIV.has(t);}else if(a){if(ag&&!a.rub){a.rub=s;ag=false;}else a.txt=a.txt?a.txt+" "+s:s;}}return ds;}

// Analysis functions (matching Python)
function extrairRemissoes(ds){const re=/(?:§\s*\d+[ºo°]?\s+d[oe]\s+)?(?:arts?\.\s*)(\d+[ºo°]?(?:\s*(?:,|e|a)\s*\d+[ºo°]?)*)/gi;const res=[];let art="";
  for(const d of ds){if(d.tipo==="ARTIGO")art=d.id;const full=d.txt+" "+d.rub;let m;re.lastIndex=0;while((m=re.exec(full))!==null){const refs=m[1].match(/\d+[ºo°]?/g)||[];for(const r of refs){const dest="Art. "+r;if(dest!==art&&art)res.push({origem:art,disp:d.id,destino:dest,ctx:full.trim(),tipo:d.tipo});}}}return res;}

function extrairPrazosValores(ds){const reVal=/R\$\s*[\d\.]+,\d{2}/g;const rePct=/\d+(?:[,\.]\d+)?\s*%/g;const rePrazo=/(?:\d+\s*(?:dias?|meses?|anos?|horas?))|(?:at[ée]\s+\d{1,2}\s+de\s+\w+)/gi;
  const res=[];let art="",cap="";for(const d of ds){if(d.tipo==="CAPÍTULO")cap=d.rub||d.id;if(d.tipo==="ARTIGO")art=d.id;if(!d.txt)continue;
    for(const rx of[[reVal,"VALOR (R$)"],[rePct,"PERCENTUAL (%)"],[rePrazo,"PRAZO"]]){rx[0].lastIndex=0;let m;while((m=rx[0].exec(d.txt))!==null)res.push({art,cap,disp:d.id,tipo:rx[1],val:m[0],ctx:d.txt});}}return res;}

function buildIdx(ds,area){const ws=AREAS[area]?.palavras||[];const idx={};let art="";for(const d of ds){if(d.tipo==="ARTIGO")art=d.id;const t=(d.txt+" "+d.rub).toLowerCase();for(const w of ws)if(t.includes(w.toLowerCase())&&art){if(!idx[w])idx[w]=[];if(!idx[w].includes(art))idx[w].push(art);}}return Object.fromEntries(Object.entries(idx).sort((a,b)=>a[0].localeCompare(b[0],"pt")));}

function hierarquia(ds){const ctx={};const trilha={TÍTULO:"",CAPÍTULO:"",SEÇÃO:"",SUBSEÇÃO:""};const niv=["TÍTULO","CAPÍTULO","SEÇÃO","SUBSEÇÃO"];
  for(const d of ds){if(DIV.has(d.tipo)){trilha[d.tipo]=d.rub||d.id;const i=niv.indexOf(d.tipo);for(let j=i+1;j<niv.length;j++)trilha[niv[j]]="";}
    if(d.tipo==="ARTIGO")ctx[d.id]=Object.values(trilha).filter(Boolean).join(" > ");}return ctx;}

async function pdfToText(f){const ab=await f.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:ab}).promise;let fullText="";
  for(let i=1;i<=pdf.numPages;i++){const pg=await pdf.getPage(i);const c=await pg.getTextContent();
    // Sort items by Y (descending=top first) then X (left to right)
    const items=c.items.filter(x=>x.str.trim()).sort((a,b)=>{const dy=b.transform[5]-a.transform[5];return Math.abs(dy)>3?dy:a.transform[4]-b.transform[4];});
    let lastY=null;let line="";
    for(const item of items){const y=Math.round(item.transform[5]);
      if(lastY!==null&&Math.abs(y-lastY)>3){fullText+=line.trim()+"\n";line="";}
      line+=(line?" ":"")+item.str;lastY=y;}
    if(line.trim())fullText+=line.trim()+"\n";}
  // Post-process: force line breaks before structural patterns that may have been merged
  fullText=fullText.replace(/([.;:)\]]) *(Art\.\s*\d)/g,"$1\n$2");
  fullText=fullText.replace(/([.;:)\]]) *(§\s*\d)/g,"$1\n$2");
  fullText=fullText.replace(/([.;:)\]]) *(Parágrafo único)/gi,"$1\n$2");
  fullText=fullText.replace(/ (TÍTULO\s+[IVXLCDM])/g,"\n$1");
  fullText=fullText.replace(/ (CAPÍTULO\s+[IVXLCDM])/g,"\n$1");
  fullText=fullText.replace(/ (Seção\s+[IVXLCDM])/gi,"\n$1");
  fullText=fullText.replace(/ (Subseção\s+[IVXLCDM])/gi,"\n$1");
  fullText=fullText.replace(/ (PARTE\s+(?:GERAL|ESPECIAL|[IVXLCDM]))/g,"\n$1");
  fullText=fullText.replace(/ (LIVRO\s+[IVXLCDM])/g,"\n$1");
  return fullText;}
function LS(k,v){if(v===undefined){try{const r=localStorage.getItem(k);return r?JSON.parse(r):null}catch{return null}}try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

const REFORMA=[{t:"EC",n:"EC 132/2023",d:"Emenda Constitucional da Reforma Tributária",dt:"20/12/2023",url:"https://www.planalto.gov.br/ccivil_03/constituicao/emendas/emc/emc132.htm",st:"Vigente",det:"IVA Dual (IBS+CBS), Imposto Seletivo. Extinção gradual PIS,COFINS,IPI,ICMS,ISS."},{t:"LC",n:"LC 214/2025",d:"Regulamentação — IBS, CBS, IS",dt:"16/01/2025",url:"https://www.planalto.gov.br/ccivil_03/leis/lcp/lcp214.htm",st:"Vigente",det:"544 artigos. Normas gerais, cashback, cesta básica, regimes."},{t:"LC",n:"LC 227/2026",d:"Regulamentação complementar",dt:"2026",url:"https://www.planalto.gov.br/ccivil_03/leis/lcp/lcp227.htm",st:"Vigente"},{t:"Fase",n:"2026 — Teste",d:"CBS 0,9% + IBS 0,1%",st:"Em vigor"},{t:"Fase",n:"2027",d:"Extinção PIS/COFINS",st:"Futuro"},{t:"Fase",n:"2029-32",d:"Redução ICMS/ISS",st:"Futuro"},{t:"Fase",n:"2033",d:"Sistema Pleno",st:"Futuro"},{t:"Ref",n:"Portal Fazenda",url:"https://www.gov.br/fazenda/pt-br/acesso-a-informacao/acoes-e-programas/reforma-tributaria",d:"Página oficial",st:"Link"},{t:"Ref",n:"Notícias Fazenda",url:"https://www.gov.br/fazenda/pt-br/acesso-a-informacao/acoes-e-programas/reforma-tributaria/na-midia/noticiass/noticias",d:"Na Mídia",st:"Link"}];
const FONTES=[{n:"DOU Seção 1",u:"https://www.in.gov.br/leiturajornal?secao=do1"},{n:"DOU Seção 2",u:"https://www.in.gov.br/leiturajornal?secao=do2"},{n:"DOU Seção 3",u:"https://www.in.gov.br/leiturajornal?secao=do3"},{n:"Fazenda — Reforma",u:"https://www.gov.br/fazenda/pt-br/acesso-a-informacao/acoes-e-programas/reforma-tributaria/na-midia/noticiass/noticias"},{n:"Portal NF-e",u:"https://www.nfe.fazenda.gov.br/portal/listaConteudo.aspx?tipoConteudo=04BIflQt1aY="}];

// ═══ APP ═══
function App(){
  const [lib,setLib]=useState(()=>LS("t3-lib")||[]);const [sel,setSel]=useState(null);const [vw,setVw]=useState("library");const [uping,setUp]=useState(false);const [area,setArea]=useState("tributario");const [study,setStudy]=useState(()=>LS("t3-st")||{});const [apiKey,setApiKey]=useState(()=>LS("t3-key")||"");const fRef=useRef(null);

  const upF=async e=>{const f=e.target.files?.[0];if(!f)return;setUp(true);try{const t=await pdfToText(f);const ds=parse(t);const l={id:Date.now()+"",nome:f.name.replace(/\.pdf$/i,""),data:new Date().toLocaleDateString("pt-BR"),ds,nA:ds.filter(d=>d.tipo==="ARTIGO").length,nD:ds.length,area};const nl=[l,...lib];setLib(nl);LS("t3-lib",nl);setSel(l);setVw("reader");}catch(e){alert("Erro: "+e.message);}setUp(false);if(fRef.current)fRef.current.value="";};
  const del=id=>{const nl=lib.filter(l=>l.id!==id);setLib(nl);LS("t3-lib",nl);if(sel?.id===id){setSel(null);setVw("library");}};
  const uSt=(lid,di,f,v)=>{const k=`${lid}-${di}`;const n={...study,[k]:{...study[k],[f]:v}};setStudy(n);LS("t3-st",n);};
  const gSt=(lid,di,f)=>study[`${lid}-${di}`]?.[f]||"";
  const saveKey=k=>{setApiKey(k);LS("t3-key",k);};
  const nav=[{id:"library",ic:IC.bk,lb:"Biblioteca"},...(sel?[{id:"reader",ic:IC.ls,lb:sel.nome.slice(0,20)}]:[]),{id:"reforma",ic:IC.sc,lb:"Reforma"},{id:"atualizacoes",ic:IC.bl,lb:"Atualizações"}];

  return <div style={{minHeight:"100vh"}}>
    <header style={{background:"#fff",borderBottom:"1px solid #E8DFD0",padding:"8px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:34,height:34,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#B8965A,#8C6D3F)",fontWeight:700,fontSize:14,fontFamily:"'DM Mono',monospace",color:"#fff"}}>T</div>
        <div><div style={{fontSize:15,fontWeight:700,letterSpacing:"1px",fontFamily:"'DM Mono',monospace"}}>TERA</div><div style={{fontSize:9,color:"#8A8279",fontFamily:"'DM Mono',monospace"}}>RACIOCÍNIO JURÍDICO</div></div>
      </div>
      <nav style={{display:"flex",gap:2,overflowX:"auto"}}>{nav.map(n=><button key={n.id} className={`nb ${vw===n.id?"on":""}`} onClick={()=>setVw(n.id)}><Ic d={n.ic} s={14} c={vw===n.id?"#8C6D3F":"#8A8279"}/>{n.lb}</button>)}</nav>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <a href="https://www.planalto.gov.br" target="_blank" style={{fontSize:11,color:"#8A8279",textDecoration:"none",padding:"5px 8px",border:"1px solid #E8DFD0",borderRadius:5,display:"flex",alignItems:"center",gap:3}}><Ic d={IC.lk} s={11} c="#8A8279"/>Fontes</a>
        <select value={area} onChange={e=>setArea(e.target.value)} style={{background:"#F3EDE4",border:"1px solid #E8DFD0",borderRadius:5,color:"#2D2A26",padding:"5px 8px",fontSize:11}}>{Object.entries(AREAS).map(([k,v])=><option key={k} value={k}>{v.nome}</option>)}</select>
      </div>
    </header>
    <main style={{maxWidth:1440,margin:"0 auto",padding:"20px"}}>
      {vw==="library"&&<Lib lib={lib} sel={sel} onSel={l=>{setSel(l);setVw("reader");}} onDel={del} onUp={upF} uping={uping} fRef={fRef}/>}
      {vw==="reader"&&sel&&<Reader lei={sel} area={area} gSt={gSt} uSt={uSt} apiKey={apiKey} saveKey={saveKey}/>}
      {vw==="reforma"&&<Ref/>}
      {vw==="atualizacoes"&&<Atl apiKey={apiKey} saveKey={saveKey}/>}
    </main>
  </div>;
}

function Lib({lib,sel,onSel,onDel,onUp,uping,fRef}){return <div className="fade">
  <div style={{border:"2px dashed #E8DFD0",borderRadius:14,padding:"40px 28px",textAlign:"center",marginBottom:24,background:"#F3EDE4"}}>
    {uping?<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}><Sp/><span style={{color:"#5C554A",fontSize:14}}>Processando PDF e extraindo estrutura...</span></div>
    :<><Ic d={IC.up} s={26} c="#B8965A"/><div style={{marginTop:8,fontSize:17,fontWeight:600}}>Adicionar Lei</div><div style={{color:"#8A8279",fontSize:13,marginTop:3,marginBottom:12}}>O parser LC 95/1998 roda local — sem gastar IA</div>
      <label style={{display:"inline-flex",alignItems:"center",gap:7,padding:"9px 24px",background:"linear-gradient(135deg,#B8965A,#8C6D3F)",color:"#fff",borderRadius:7,cursor:"pointer",fontSize:13,fontWeight:600}}><Ic d={IC.up} s={14} c="#fff"/>Selecionar PDF<input ref={fRef} type="file" accept=".pdf" onChange={onUp} style={{display:"none"}}/></label></>}
  </div>

  const [hist,setHist]=useState(()=>LS("t3-upd")||[]);const [ld,setLd]=useState(false);const [de,setDe]=useState("");const [ate,setAte]=useState("");const [filtro,setFiltro]=useState("Todas");const [localKey,setLocalKey]=useState(apiKey);

  const buscar=async()=>{if(!apiKey){alert("Configure a API key primeiro (aba Tutor IA).");return;}setLd(true);
    const hoje=new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric"});
    try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2048,tools:[{type:"web_search_20250305",name:"web_search"}],messages:[{role:"user",content:`Busque publicações tributárias das últimas 24 horas (hoje: ${hoje}). Pesquise em cada fonte separadamente:

FONTE 1 - DOU (Diário Oficial da União): Busque "diário oficial da união hoje tributário ${hoje}" e "DOU instrução normativa receita federal ${hoje}". Liste decretos, INs, portarias sobre tributos.

FONTE 2 - Ministério da Fazenda: Busque "reforma tributária notícias ${hoje}" e "fazenda.gov.br reforma tributária". Liste notícias sobre IBS, CBS, IS.

FONTE 3 - Portal NF-e: Busque "portal nfe nota técnica ${hoje}" e "nfe.fazenda.gov.br notícias". Liste notas técnicas e atualizações.

FORMATO OBRIGATÓRIO para cada item encontrado:
[FONTE: nome_da_fonte]
TÍTULO: título_da_publicação
RESUMO: resumo em 1-2 linhas
DATA: data_da_publicação
LINK: url_direta

Separe claramente por fonte. Se não encontrar nada relevante em alguma fonte, indique.`}]})});
      const data=await r.json();const txt=data.content?.filter(c=>c.type==="text").map(c=>c.text).join("\n")||"Sem resultados.";
      // Parse results into structured items
      const items=[];const lines=txt.split("\n");let curFonte="Geral",curItem=null;
      for(const line of lines){const fMatch=line.match(/\[FONTE:\s*(.+?)\]/i);if(fMatch){curFonte=fMatch[1].trim();continue;}
        const tMatch=line.match(/^TÍTULO:\s*(.+)/i);if(tMatch){if(curItem)items.push(curItem);curItem={fonte:curFonte,titulo:tMatch[1].trim(),resumo:"",data:hoje,link:"",fetchDate:hoje,fetchTime:new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})};continue;}
        if(curItem){const rM=line.match(/^RESUMO:\s*(.+)/i);if(rM){curItem.resumo=rM[1].trim();continue;}const dM=line.match(/^DATA:\s*(.+)/i);if(dM){curItem.data=dM[1].trim();continue;}const lM=line.match(/^LINK:\s*(.+)/i);if(lM){curItem.link=lM[1].trim();continue;}}}
      if(curItem)items.push(curItem);
      if(items.length===0)items.push({fonte:"Resultado",titulo:"Busca realizada",resumo:txt.slice(0,500),data:hoje,link:"",fetchDate:hoje,fetchTime:new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})});
      const nh=[...items,...hist];setHist(nh);LS("t3-upd",nh);
    }catch(e){alert("Erro: "+e.message);}setLd(false);};

  const fontes=["Todas",...new Set(hist.map(h=>h.fonte))];
  const filtered=hist.filter(h=>{if(filtro!=="Todas"&&h.fonte!==filtro)return false;if(de){const[dd,dm,dy]=de.split("/");const dDate=new Date(dy,dm-1,dd);const[hd,hm,hy]=(h.fetchDate||h.data).split("/");const hDate=new Date(hy,hm-1,hd);if(hDate<dDate)return false;}
    if(ate){const[dd,dm,dy]=ate.split("/");const dDate=new Date(dy,dm-1,dd);const[hd,hm,hy]=(h.fetchDate||h.data).split("/");const hDate=new Date(hy,hm-1,hd);if(hDate>dDate)return false;}return true;});

  if(!apiKey)return <div className="fade"><h2 style={{fontSize:19,fontWeight:700,marginBottom:12}}>Atualizações Diárias</h2>
    <div className="cd" style={{padding:20,background:"#F5EDDF",borderColor:"#B8965A"}}><div style={{fontWeight:700,fontSize:14,marginBottom:6}}>Configure a API Key para buscar atualizações</div><div style={{fontSize:12,color:"#5C554A",marginBottom:10}}>Obtenha em <a href="https://console.anthropic.com" target="_blank" style={{color:"#B8965A"}}>console.anthropic.com</a></div>
      <div style={{display:"flex",gap:6}}><input value={localKey} onChange={e=>setLocalKey(e.target.value)} placeholder="sk-ant-api03-..." style={{flex:1,background:"#fff",border:"1px solid #E8DFD0",borderRadius:6,padding:"8px 10px",fontSize:12,fontFamily:"'DM Mono',monospace"}}/><button onClick={()=>saveKey(localKey)} style={{background:"linear-gradient(135deg,#B8965A,#8C6D3F)",color:"#fff",border:"none",borderRadius:6,padding:"8px 18px",fontSize:12,fontWeight:600,cursor:"pointer"}}>Salvar</button></div></div></div>;

  return <div className="fade"><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16,flexWrap:"wrap",gap:10}}>
    <div><h2 style={{fontSize:19,fontWeight:700}}>Atualizações Diárias</h2><div style={{fontSize:11,color:"#8A8279",marginTop:2}}>DOU · Fazenda · NF-e — {hist.length} itens no banco</div></div>
    <button onClick={buscar} disabled={ld} style={{display:"flex",alignItems:"center",gap:5,padding:"8px 18px",background:"linear-gradient(135deg,#B8965A,#8C6D3F)",color:"#fff",border:"none",borderRadius:7,cursor:ld?"wait":"pointer",fontSize:12,fontWeight:600,opacity:ld?.6:1}}>{ld?<Sp/>:<Ic d={IC.rf} s={13} c="#fff"/>}{ld?"Buscando...":"Buscar Últimas 24h"}</button>
  </div>
  {/* LINKS DIRETOS */}
  <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>{FONTES.map((f,i)=><a key={i} href={f.u} target="_blank" className="cd" style={{padding:"8px 12px",textDecoration:"none",color:"#2D2A26",display:"flex",alignItems:"center",gap:5,fontSize:12}}><Ic d={IC.lk} s={12} c="#B8965A"/>{f.n}</a>)}</div>
  {/* FILTROS */}
  <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>
    <span style={{fontSize:11,color:"#8A8279"}}>Filtros:</span>
    <select value={filtro} onChange={e=>setFiltro(e.target.value)} style={{background:"#F3EDE4",border:"1px solid #E8DFD0",borderRadius:5,padding:"4px 8px",fontSize:11}}>{fontes.map(f=><option key={f}>{f}</option>)}</select>
    <input value={de} onChange={e=>setDe(e.target.value)} placeholder="De: dd/mm/aaaa" style={{background:"#F3EDE4",border:"1px solid #E8DFD0",borderRadius:5,padding:"4px 8px",fontSize:11,width:110}}/>
    <input value={ate} onChange={e=>setAte(e.target.value)} placeholder="Até: dd/mm/aaaa" style={{background:"#F3EDE4",border:"1px solid #E8DFD0",borderRadius:5,padding:"4px 8px",fontSize:11,width:110}}/>
    <span style={{fontSize:11,color:"#8A8279"}}>{filtered.length} resultados</span>
    {hist.length>0&&<button onClick={()=>{if(confirm("Limpar todo o histórico?")){setHist([]);LS("t3-upd",[]);}}} style={{background:"none",border:"1px solid #E8DFD0",borderRadius:5,padding:"4px 8px",fontSize:10,color:"#8A8279",cursor:"pointer"}}>Limpar</button>}
  </div>
  {/* RESULTADOS */}
  {filtered.length>0?<div style={{display:"flex",flexDirection:"column",gap:6}}>{filtered.map((h,i)=><div key={i} className="cd" style={{padding:"12px 14px"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
      <div style={{flex:1}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}><span className="badge" style={{background:"#F5EDDF",color:"#8C6D3F"}}>{h.fonte}</span><span style={{fontSize:10,color:"#8A8279",fontFamily:"'DM Mono',monospace"}}>{h.data}</span></div>
        <div style={{fontWeight:600,fontSize:13}}>{h.titulo}</div>
        {h.resumo&&<div style={{fontSize:12,color:"#5C554A",marginTop:2,lineHeight:1.5}}>{h.resumo}</div>}
      </div>
      {h.link&&h.link.startsWith("http")&&<a href={h.link} target="_blank" style={{display:"flex",alignItems:"center",gap:3,fontSize:11,color:"#B8965A",textDecoration:"none",whiteSpace:"nowrap",marginLeft:10}}><Ic d={IC.lk} s={11} c="#B8965A"/>Fonte</a>}
    </div>
    <div style={{fontSize:9,color:"#8A8279",marginTop:4,fontFamily:"'DM Mono',monospace"}}>Buscado em {h.fetchDate} às {h.fetchTime}</div>
  </div>)}</div>:<div style={{textAlign:"center",padding:32,color:"#8A8279"}}><div style={{fontSize:14}}>Nenhum resultado{filtro!=="Todas"?" para este filtro":""}</div><div style={{fontSize:12,marginTop:4}}>Clique "Buscar Últimas 24h" para começar</div></div>}
  </div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
