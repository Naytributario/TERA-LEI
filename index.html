// Parser
const PATS=[{t:"PARTE",r:/^\s*PARTE\s+(?:GERAL|ESPECIAL|[IVXLCDM]+|PRELIMINAR)\s*$/i},{t:"LIVRO",r:/^\s*LIVRO\s+(?:[IVXLCDM]+|ÚNICO)\s*$/i},{t:"TÍTULO",r:/^\s*T[ÍI]TULO\s+(?:[IVXLCDM]+|ÚNICO)\s*$/i},{t:"CAPÍTULO",r:/^\s*CAP[ÍI]TULO\s+(?:[IVXLCDM]+|ÚNICO)\s*$/i},{t:"SEÇÃO",r:/^\s*SE[ÇC][ÃA]O\s+(?:[IVXLCDM]+|ÚNICA)\s*$/i},{t:"SUBSEÇÃO",r:/^\s*SUBSE[ÇC][ÃA]O\s+(?:[IVXLCDM]+|ÚNICA)\s*$/i},{t:"ARTIGO",r:/^\s*Art\.\s*\d+[ºo°]?[\s\-\.]+/},{t:"PARÁGRAFO",r:/^\s*(?:§\s*\d+[ºo°]?\.?\s|Par[áa]grafo\s+[úu]nico\.?\s)/i},{t:"INCISO",r:/^\s*[IVXLCDM]+\s*[\-–—]\s+/},{t:"ALÍNEA",r:/^\s*[a-z]\)\s+/},{t:"ITEM",r:/^\s*\d+\.\s+/}];

function idT(s){for(const p of PATS)if(p.r.test(s.trim()))return p.t;return null;}
function exId(t,s){s=s.trim();if(DIV.has(t))return s;const R={ARTIGO:/^(Art\.\s*\d+[ºo°]?[\-\.]?)/,PARÁGRAFO:/^(§\s*\d+[ºo°]?\.?|Par[áa]grafo\s+[úu]nico\.?)/i,INCISO:/^([IVXLCDM]+)\s*[\-–—]/,ALÍNEA:/^([a-z]\))/,ITEM:/^(\d+\.)/};const m=R[t]?.exec(s);return m?m[1].trim():s.slice(0,30);}
function exTx(t,s){s=s.trim();if(DIV.has(t))return"";const R={ARTIGO:/^Art\.\s*\d+[ºo°]?[\s\-\.]+(.+)/,PARÁGRAFO:/^(?:§\s*\d+[ºo°]?\.?\s+|Par[áa]grafo\s+[úu]nico\.?\s+)(.+)/i,INCISO:/^[IVXLCDM]+\s*[\-–—]\s+(.+)/,ALÍNEA:/^[a-z]\)\s+(.+)/,ITEM:/^\d+\.\s+(.+)/};const m=R[t]?.exec(s);return m?m[1].trim():s;}
function parse(txt){const ds=[];let a=null,ag=false;const reAltera=/\[?\s*(Reda[çc][ãa]o dada pel[oa]\(a\)[^\]]*|Inclu[ií]d[oa]\(a\) pel[oa]\(a\)[^\]]*|Revogad[oa]\(a\) pel[oa]\(a\)[^\]]*)\]?/gi;const reVetado=/\(\s*(?:VETADO|Vetado|vetado)\s*\)/;const reRevogado=/\(\s*(?:REVOGADO|Revogado|revogado)\s*\)/;
  for(const l of txt.split("\n")){const s=l.trim();if(!s){if(ag&&a)ag=false;continue;}const t=idT(s);if(t){let alteracao="";let status="vigente";const altM=s.match(reAltera);if(altM)alteracao=altM.map(m=>m.replace(/^\[|\]$/g,"").trim()).join("; ");const cleanTxt=s.replace(reAltera,"").trim();if(reVetado.test(cleanTxt))status="vetado";else if(reRevogado.test(cleanTxt))status="revogado";if(/revogad/i.test(alteracao))status="revogado";a={tipo:t,id:exId(t,cleanTxt),rub:"",txt:exTx(t,cleanTxt),status,alteracao};ds.push(a);ag=DIV.has(t);}else if(a){if(ag&&!a.rub){a.rub=s;ag=false;}else{const altM=s.match(reAltera);if(altM){a.alteracao=a.alteracao?(a.alteracao+"; "+altM.map(m=>m.replace(/^\[|\]$/g,"").trim()).join("; ")):altM.map(m=>m.replace(/^\[|\]$/g,"").trim()).join("; ");const cleaned=s.replace(reAltera,"").trim();if(cleaned)a.txt=a.txt?a.txt+" "+cleaned:cleaned;}else{a.txt=a.txt?a.txt+" "+s:s;}}if(reVetado.test(a.txt))a.status="vetado";if(reRevogado.test(a.txt))a.status="revogado";if(a.alteracao&&/revogad/i.test(a.alteracao))a.status="revogado";}}return detectVetados(ds);}

function detectVetados(ds){
  // Detecta vetos por IDs duplicados consecutivos (LC 95/1998):
  // Quando o mesmo dispositivo (mesmo tipo + mesmo identificador normalizado)
  // aparece mais de uma vez em sequência, as versões anteriores estão vetadas/superadas.
  // A última ocorrência é a versão vigente (pode ter "Redação dada pela...").
  const normId=id=>(id||"").replace(/[^a-zA-Z0-9ºo°§úÚ]/g,"").toLowerCase();
  for(let i=0;i<ds.length;i++){
    if(DIV.has(ds[i].tipo)||ds[i].status!=="vigente")continue;
    const myNorm=normId(ds[i].id);if(!myNorm)continue;
    // Procura adiante: pula divisões e dispositivos filhos, busca mesmo tipo+id
    let j=i+1;
    // Coleta o bloco de filhos do dispositivo atual
    const nivHier={"ARTIGO":0,"PARÁGRAFO":1,"INCISO":2,"ALÍNEA":3,"ITEM":4};
    const meuNiv=nivHier[ds[i].tipo];
    if(meuNiv===undefined)continue;
    while(j<ds.length){
      if(DIV.has(ds[j].tipo)){j++;continue;}
      const outroNiv=nivHier[ds[j].tipo];
      if(outroNiv===undefined){j++;continue;}
      // Se encontrou mesmo tipo com mesmo ID = versão anterior é vetada
      if(ds[j].tipo===ds[i].tipo&&normId(ds[j].id)===myNorm){
        ds[i].status="vetado";break;
      }
      // Se encontrou dispositivo do mesmo nível ou superior com ID diferente, para
      if(outroNiv<=meuNiv&&normId(ds[j].id)!==myNorm)break;
      j++;
    }
  }
  return ds;
}

function extrairRemissoes(ds){const re=/(?:§\s*\d+[ºo°]?\s+d[oe]\s+)?(?:arts?\.\s*)(\d+[ºo°]?(?:\s*(?:,|e|a)\s*\d+[ºo°]?)*)/gi;const res=[];let art="";

function extrairPrazosValores(ds){const reVal=/R\$\s*[\d\.]+,\d{2}/g;const rePct=/\d+(?:[,\.]\d+)?\s*%/g;const rePrazo=/(?:\d+\s*(?:dias?|meses?|anos?|horas?))|(?:at[ée]\s+\d{1,2}\s+de\s+\w+)/gi;
  const res=[];let art="",cap="";for(const d of ds){if(d.tipo==="CAPÍTULO")cap=d.rub||d.id;if(d.tipo==="ARTIGO")art=d.id;if(!d.txt)continue;
    for(const rx of[[reVal,"VALOR (R$)"],[rePct,"PERCENTUAL (%)"],[rePrazo,"PRAZO"]]){rx[0].lastIndex=0;let m;while((m=rx[0].exec(d.txt))!==null)res.push({art,cap,disp:d.id,tipo:rx[1],val:m[0],ctx:d.txt});}}return res;}

function buildIdx(ds,area){const ws=AREAS[area]?.palavras||[];const idx={};let art="";for(const d of ds){if(d.tipo==="ARTIGO")art=d.id;const t=(d.txt+" "+d.rub).toLowerCase();for(const w of ws)if(t.includes(w.toLowerCase())&&art){if(!idx[w])idx[w]=[];if(!idx[w].includes(art))idx[w].push(art);}}return Object.fromEntries(Object.entries(idx).sort((a,b)=>a[0].localeCompare(b[0],"pt")));}

function fullTextSearch(ds,termo){
  if(!termo||termo.length<3)return[];
  const t=termo.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const resultados=[];let artAtual="";
  for(let i=0;i<ds.length;i++){const d=ds[i];
    if(d.tipo==="ARTIGO")artAtual=d.id;
    const texto=((d.id||"")+" "+(d.rub||"")+" "+(d.txt||"")).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    if(texto.includes(t)){
      const ocorrencias=(texto.split(t).length-1);
      resultados.push({idx:i,tipo:d.tipo,id:d.id,art:artAtual,txt:d.txt,rub:d.rub,ocorrencias,status:d.status||"vigente"});
    }
  }
  return resultados;
}

function hierarquia(ds){const ctx={};const trilha={PARTE:"",LIVRO:"",TÍTULO:"",CAPÍTULO:"",SEÇÃO:"",SUBSEÇÃO:""};const niv=["PARTE","LIVRO","TÍTULO","CAPÍTULO","SEÇÃO","SUBSEÇÃO"];
  for(const d of ds){if(DIV.has(d.tipo)){trilha[d.tipo]=d.rub||d.id;const i=niv.indexOf(d.tipo);for(let j=i+1;j<niv.length;j++)trilha[niv[j]]="";}
    if(d.tipo==="ARTIGO")ctx[d.id]=Object.values(trilha).filter(Boolean).join(" > ");}return ctx;}

async function pdfToText(f){const ab=await f.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:ab}).promise;let fullText="";
  for(let i=1;i<=pdf.numPages;i++){const pg=await pdf.getPage(i);const c=await pg.getTextContent();
    const items=c.items.filter(x=>x.str.trim()).sort((a,b)=>{const dy=b.transform[5]-a.transform[5];return Math.abs(dy)>3?dy:a.transform[4]-b.transform[4];});
    let lastY=null;let line="";
    for(const item of items){const y=Math.round(item.transform[5]);
      if(lastY!==null&&Math.abs(y-lastY)>3){fullText+=line.trim()+"\n";line="";}
      line+=(line?" ":"")+item.str;lastY=y;}
    if(line.trim())fullText+=line.trim()+"\n";}
  fullText=fullText.replace(/([.;:)\]]) *(§\s*\d)/g,"$1\n$2");
  fullText=fullText.replace(/([.;:)\]]) *(Parágrafo único)/gi,"$1\n$2");
  fullText=fullText.replace(/ (TÍTULO\s+[IVXLCDM])/g,"\n$1");
  fullText=fullText.replace(/ (CAPÍTULO\s+[IVXLCDM])/g,"\n$1");
  fullText=fullText.replace(/ (Seção\s+[IVXLCDM])/gi,"\n$1");
  fullText=fullText.replace(/ (Subseção\s+[IVXLCDM])/gi,"\n$1");
  fullText=fullText.replace(/ (PARTE\s+(?:GERAL|ESPECIAL|[IVXLCDM]))/g,"\n$1");
  fullText=fullText.replace(/ (LIVRO\s+[IVXLCDM])/g,"\n$1");
  fullText=fullText.replace(/\s*(?:\u0000|\ufffd)?\s*ANEXO\s+[IVXLCDM]+\.pdf/gi,"");
  fullText=fullText.replace(/ANEXO\s+[IVXLCDM]+\.pdf/gi,"");
  fullText=fullText.replace(/\* Este texto não substitui o publicado oficialmente\./gi,"");
  return fullText;}

class ErrorBoundary extends React.Component{constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(error){return{hasError:true,error};}
  componentDidCatch(error,errorInfo){console.error("Erro capturado:",error,errorInfo);}
  render(){if(this.state.hasError){return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)",padding:20}}><div style={{maxWidth:500,textAlign:"center"}}><div style={{fontSize:32,marginBottom:16}}>⚠️</div><h1 style={{fontSize:24,fontWeight:700,marginBottom:12,color:"var(--text)"}}>Erro na Renderização</h1><p style={{fontSize:14,color:"var(--text-sec)",marginBottom:16,lineHeight:1.6}}>Ocorreu um erro ao carregar a aplicação. Por favor, recarregue a página.</p><details style={{marginTop:16,padding:12,background:"var(--bg-hover)",borderRadius:8,textAlign:"left",fontSize:12}}><summary style={{cursor:"pointer",fontWeight:600,marginBottom:8}}>Detalhes do Erro</summary><pre style={{overflow:"auto",padding:8,background:"var(--bg-card)",borderRadius:4,fontSize:11}}>{this.state.error?.toString()}</pre></details><button onClick={()=>window.location.reload()} style={{marginTop:16,padding:"10px 20px",background:"var(--grad)",color:"#fff",border:"none",borderRadius:8,cursor:"pointer",fontSize:14,fontWeight:600}}>Recarregar Página</button></div></div>;}return this.props.children;}}

// ═══ READER ═══
function Reader({lei,area,gSt,uSt,apiKey,saveKey,addAnexo,delAnexo,study}){
  const [tab,setTab]=useState("texto");const [saved,setSaved]=useState(false);const [goSearch,setGoSearch]=useState("");
  const tabs=[{id:"sumario",lb:"Sumário"},{id:"texto",lb:"Texto Integral"},{id:"artigos",lb:"Artigos"},{id:"estudo",lb:"Estudo Guiado"},{id:"remissoes",lb:"Remissões"},{id:"prazos",lb:"Prazos/Valores"},{id:"indice",lb:"Índice"},{id:"mapa",lb:"Mapa"},{id:"anexos",lb:`Anexos (${(lei.anexos||[]).length})`},{id:"teia",lb:"🕸 Teia"},{id:"tutor",lb:"Tutor IA"},{id:"sabatina",lb:"Sabatina"}];
  const ds=lei.ds;
  const showSaved=()=>{setSaved(true);setTimeout(()=>setSaved(false),1500);};
  const wrappedUSt=(a,b,c,d)=>{uSt(a,b,c,d);showSaved();};

  // Extrai refs internas (mesma lei) de um texto, ignorando refs a leis externas.
  // Duas camadas de detecção:
  //   Camada 1: blocos parentéticos contendo citações de leis → toda ref "art." dentro é externa
  //   Camada 2: contexto inline — se há lei citada antes, verifica se o texto intermediário
  //             é apenas sintaxe de citação (→ externa) ou contém prosa (→ interna)
  const extractInternalRefs = (text) => {
    const refs = [];
    const reArt = /arts?\.\s*(\d+[ºo°]?(?:\s*(?:,|e|a)\s*\d+[ºo°]?)*)/gi;

    // --- Camada 1: mapeamento de blocos parentéticos com citação de lei ---
    const reLeiNome = /(?:Lei(?:\s+Complementar)?|Decreto(?:-Lei)?|Medida\s+Provis[óo]ria|Instru[çc][ãa]o\s+Normativa(?:\s+(?:RFB|SRF|[A-Z]{2,}))?|C[óo]digo\s+\w+)\s+n[ºo°]/i;
    const externalRanges = [];
    const reParen = /\([^)]+\)/g;
    let pm;
    while ((pm = reParen.exec(text)) !== null) {
      if (reLeiNome.test(pm[0])) {
        externalRanges.push([pm.index, pm.index + pm[0].length]);
      }
    }

    // --- Camada 2: padrão de lei para busca inline ---
    const reLeiInline = /(?:Lei(?:\s+Complementar)?\s+n[ºo°]?\s*[\d.]+|Decreto(?:-Lei)?\s+n[ºo°]?\s*[\d.]+|Medida\s+Provis[óo]ria\s+n[ºo°]?\s*[\d.]+|Instru[çc][ãa]o\s+Normativa\s+(?:RFB\s+|SRF\s+|[A-Z]{2,}\s+)?n[ºo°]?\s*[\d.]+)/gi;

    // Função auxiliar: verifica se texto entre lei e "art." é somente sintaxe de citação
    const isCitationSyntaxOnly = (between) => {
      let cleaned = between;
      // Remove datas completas: "de 13 de dezembro de 1996"
      cleaned = cleaned.replace(/,?\s*de\s+\d{1,2}\s+de\s+\w+\s+de\s+\d{4}/g, "");
      // Remove datas curtas: "de 1998", "de 2002"
      cleaned = cleaned.replace(/,?\s*de\s+\d{4}/g, "");
      // Remove referências a artigos/parágrafos/incisos/alíneas
      cleaned = cleaned.replace(/\s*arts?\.\s*\d+[ºo°]?/g, "");
      cleaned = cleaned.replace(/\s*§+\s*\d*[ºo°]?\.?/g, "");
      cleaned = cleaned.replace(/\s*incisos?\s+[IVXLCDM]+/gi, "");
      cleaned = cleaned.replace(/\s*al[íi]neas?\s+[a-z]\)?/gi, "");
      cleaned = cleaned.replace(/\s*itens?\s+\d+/gi, "");
      // Remove nomes de lei que podem aparecer encadeados (Lei nº X ... e Lei nº Y)
      cleaned = cleaned.replace(/(?:Lei(?:\s+Complementar)?\s+n[ºo°]?\s*[\d.]+|Decreto(?:-Lei)?\s+n[ºo°]?\s*[\d.]+)/gi, "");
      // Remove pontuação, conectores e espaço
      cleaned = cleaned.replace(/[,;.\s\-–—ºo°:()]+/g, " ");
      cleaned = cleaned.replace(/\b(?:e|a|de|do|da|dos|das|no|na|nos|nas|ao|caput)\b/gi, "");
      cleaned = cleaned.trim();
      return cleaned.length === 0;
    };

    let m;
    while ((m = reArt.exec(text)) !== null) {
      const pos = m.index;

      // Camada 1: dentro de bloco parentético com citação de lei?
      const inExtParen = externalRanges.some(([s, e]) => pos >= s && pos <= e);
      if (inExtParen) continue;

      // Camada 2: lei citada no contexto inline (mesmo trecho, sem fronteira de frase)?
      const before = text.slice(Math.max(0, pos - 250), pos);
      let isExternal = false;

      // Procura a última citação de lei no trecho anterior
      reLeiInline.lastIndex = 0;
      let lastLaw = null;
      let lm;
      while ((lm = reLeiInline.exec(before)) !== null) {
        lastLaw = { index: lm.index, end: lm.index + lm[0].length, text: lm[0] };
      }

      if (lastLaw) {
        const between = before.slice(lastLaw.end);
        if (isCitationSyntaxOnly(between)) {
          isExternal = true;
        }
        // Se o texto intermediário contém prosa substantiva, é ref interna
        // (ex: "..., exceto quanto às disposições específicas referentes aos tributos mencionados no")
      }

      if (isExternal) continue;

      // É referência interna
      const nums = m[1].match(/\d+[ºo°]?/g) || [];
      for (const n of nums) {
        const artId = "Art. " + n;
        if (!refs.includes(artId)) refs.push(artId);
      }
    }
    return refs;
  };

  // Encontra o artigo vigente (pula vetados, retorna info de revogado)
  const findDevice = (artId) => {
    const cleanId = artId.replace(/^Art\.\s*/i, "").trim();
    const matches = ds.filter(d => d.tipo === "ARTIGO" && d.id.replace(/[^0-9]/g,"") === cleanId.replace(/[^0-9]/g,""));
    if (matches.length === 0) return null;
    // Prioriza vigente, depois revogado
    const vigente = matches.find(d => d.status === "vigente");
    if (vigente) return vigente;
    const revogado = matches.find(d => d.status === "revogado");
    if (revogado) return revogado;
    return matches[matches.length - 1]; // última versão
  };

  // Coleta sub-dispositivos (§, incisos, alíneas) de um artigo
  const getSubDevices = (artId) => {
    const subs = [];
    let inside = false;
    for (const d of ds) {
      if (d.tipo === "ARTIGO" && d.id === artId) { inside = true; continue; }
      if (inside) {
        if (d.tipo === "ARTIGO" || DIV.has(d.tipo)) break;
        if (d.status !== "vetado") subs.push(d);
      }
    }
    return subs;
  };

  // Constrói árvore recursiva de remissões
  const buildRecursiveTree = (startId, visited = new Set()) => {
    if (visited.has(startId)) return null;
    visited.add(startId);
    const device = findDevice(startId);
    if (!device) return null;

    const isRevogado = device.status === "revogado";
    const subs = getSubDevices(device.id);
    const fullText = [device.txt || "", ...subs.map(s => (s.id || "") + " " + (s.txt || ""))].join(" ");

    // Se revogado, não seguir refs
    const refs = isRevogado ? [] : extractInternalRefs(fullText);
    // Remove auto-referência
    const selfNum = device.id.replace(/[^0-9]/g, "");
    const filteredRefs = refs.filter(r => r.replace(/[^0-9]/g, "") !== selfNum);

    const children = [];
    for (const ref of filteredRefs) {
      const child = buildRecursiveTree(ref, new Set(visited));
      if (child) children.push(child);
    }

    return {
      id: device.id,
      text: (device.txt || "").trim(),
      status: device.status || "vigente",
      alteracao: device.alteracao || "",
      subs: subs.slice(0, 10), // limita para performance
      refs: filteredRefs,
      children
    };
  };

  // Mantém compatibilidade com exportação Excel (cadeia linear simplificada)
  const buildRecursiveChain = (startId) => {
    const chain = [];
    const visited = new Set();
    let currentId = startId;
    while (currentId && !visited.has(currentId)) {
      visited.add(currentId);
      const device = findDevice(currentId);
      if (!device) break;
      const fullText = (device.rub || "") + " " + (device.txt || "");
      const refs = extractInternalRefs(fullText);
      const selfNum = device.id.replace(/[^0-9]/g, "");
      const filteredRefs = refs.filter(r => r.replace(/[^0-9]/g, "") !== selfNum);
      chain.push({ id: device.id, text: fullText.trim(), refs: filteredRefs });
      currentId = filteredRefs.length > 0 ? filteredRefs[0] : null;
    }
    return chain;
  };

  const exportXlsx=()=>{try{const wb=XLSX.utils.book_new();
    // Texto Integral
    const txData=[["#","Tipo","Identificador","Rubrica","Texto","Status Legal","Alteração"],...ds.map((d,i)=>[i+1,d.tipo,d.id,d.rub,d.txt,d.status||"vigente",d.alteracao||""])];
    const wsTx=XLSX.utils.aoa_to_sheet(txData);
    wsTx["!cols"]=[{wch:6},{wch:14},{wch:18},{wch:40},{wch:80},{wch:12},{wch:50}];
    XLSX.utils.book_append_sheet(wb,wsTx,"Texto Integral");
    // Estudo Guiado
    const ctx=hierarquia(ds);let art="";const estData=[["Localização","Artigo","Dispositivo","Texto","Status Estudo","Dificuldade","Anotação","Status Legal"]];
    for(let i=0;i<ds.length;i++){const d=ds[i];if(d.tipo==="ARTIGO")art=d.id;if(!DIV.has(d.tipo))estData.push([ctx[art]||"",art,d.id,d.txt,gSt(lei.id,i,"status"),gSt(lei.id,i,"dif"),gSt(lei.id,i,"note"),d.status||"vigente"]);}
    const wsEst=XLSX.utils.aoa_to_sheet(estData);
    wsEst["!cols"]=[{wch:40},{wch:12},{wch:18},{wch:70},{wch:14},{wch:14},{wch:40},{wch:12}];
    XLSX.utils.book_append_sheet(wb,wsEst,"Estudo Guiado");
    
    // Teia
    const teiaData = [["Artigo Origem", "Caminho da Teia (Texto Integral)"]];
    const artigos = ds.filter(d => d.tipo === "ARTIGO");
    artigos.forEach(a => {
      const chain = buildRecursiveChain(a.id);
      if (chain.length > 1) {
        const pathText = chain.map(c => `[${c.id}]\n${c.text}`).join("\n\n↓\n\n");
        teiaData.push([a.id, pathText]);
      }
    });
    const wsTeia=XLSX.utils.aoa_to_sheet(teiaData);
    wsTeia["!cols"]=[{wch:16},{wch:100}];
    XLSX.utils.book_append_sheet(wb,wsTeia,"Teia de Remissões");

    // Remissões
    const rem=extrairRemissoes(ds);const remData=[["#","Origem","Dispositivo","Referência","Contexto"],...rem.map((r,i)=>[i+1,r.origem,r.disp,r.destino,r.ctx])];
    const wsRem=XLSX.utils.aoa_to_sheet(remData);
    wsRem["!cols"]=[{wch:6},{wch:14},{wch:18},{wch:14},{wch:80}];
    XLSX.utils.book_append_sheet(wb,wsRem,"Remissões");
    // Prazos e Valores
    const pv=extrairPrazosValores(ds);const pvData=[["#","Tipo","Conteúdo","Artigo","Capítulo","Contexto"],...pv.map((r,i)=>[i+1,r.tipo,r.val,r.art,r.cap,r.ctx])];
    const wsPv=XLSX.utils.aoa_to_sheet(pvData);
    wsPv["!cols"]=[{wch:6},{wch:18},{wch:22},{wch:12},{wch:35},{wch:80}];
    XLSX.utils.book_append_sheet(wb,wsPv,"Prazos e Valores");
    // Índice Remissivo
    const idx=buildIdx(ds,area);const idxData=[["Palavra-chave","Artigos","Qtd"],...Object.entries(idx).map(([p,a])=>[p,a.join(", "),a.length])];
    const wsIdx=XLSX.utils.aoa_to_sheet(idxData);
    wsIdx["!cols"]=[{wch:25},{wch:80},{wch:8}];

  return <div className="fade">

      </div>
    </div>
    <div style={{display:"flex",gap:0,borderBottom:"1px solid var(--border)",marginBottom:14,overflowX:"auto"}}>{tabs.map(t=><button key={t.id} className={`stab ${tab===t.id?"on":""}`} onClick={()=>setTab(t.id)}>{t.lb}</button>)}</div>
    {tab==="sumario"&&<TabSumario ds={ds}/>}
    {tab==="texto"&&<TabTexto ds={ds} lei={lei} gSt={gSt} uSt={wrappedUSt} initialSearch={goSearch}/>}
    {tab==="artigos"&&<TabArtigos ds={ds}/>}
    {tab==="estudo"&&<TabEstudo ds={ds} lei={lei} gSt={gSt} uSt={wrappedUSt}/>}
    {tab==="remissoes"&&<TabRemissoes ds={ds}/>}
    {tab==="teia"&&<TabTeia ds={ds} buildRecursiveTree={buildRecursiveTree} buildRecursiveChain={buildRecursiveChain}/>}
    {tab==="prazos"&&<TabPrazos ds={ds}/>}
    {tab==="indice"&&<TabIndice ds={ds} area={area} onGoToArt={a=>{setGoSearch(a);setTab("texto");}}/>}
    {tab==="mapa"&&<TabMapa ds={ds}/>}
    {tab==="anexos"&&<TabAnexos lei={lei} addAnexo={addAnexo} delAnexo={delAnexo}/>}
    {tab==="tutor"&&<TabTutor lei={lei} area={area} apiKey={apiKey} saveKey={saveKey}/>}
    {tab==="sabatina"&&<TabSabatina lei={lei} area={area} apiKey={apiKey} saveKey={saveKey}/>}
  </div>;
}

          {nt&&<div style={{marginTop:3,padding:"2px 6px",background:"var(--gold-subtle)",borderLeft:"2px solid #B8965A",borderRadius:3,fontSize:11,color:"var(--gold)",textDecoration:"none",fontWeight:400,opacity:1}}>{nt}</div>}

function TabRemissoes({ds}){const rem=useMemo(()=>extrairRemissoes(ds),[ds]);return <div style={{maxHeight:"70vh",overflow:"auto"}}>{rem.length===0?<div style={{textAlign:"center",padding:40,color:"var(--text-sec)"}}>Nenhuma remissão encontrada</div>:<table className="dt"><thead><tr><th>Origem</th><th>Dispositivo</th><th>Referência</th><th>Contexto</th></tr></thead><tbody>{rem.map((r,i)=><tr key={i}><td style={{fontWeight:700,color:"var(--gold)"}}>{r.origem}</td><td style={{fontSize:12}}>{r.disp}</td><td style={{fontWeight:600,color:"var(--gold)"}}>{r.destino}</td><td style={{fontSize:12}}>{r.ctx}</td></tr>)}</tbody></table>}</div>;}

function TabTeia({ds, buildRecursiveTree, buildRecursiveChain}){
  const [startArt,setStartArt]=useState("");
  const [tree,setTree]=useState(null);
  const [traced,setTraced]=useState(false);
  const arts = useMemo(() => ds.filter(d => d.tipo === "ARTIGO" && d.status !== "vetado").map(d => d.id), [ds]);

  const tracar = () => {
    if (!startArt) return;
    const t = buildRecursiveTree(startArt);
    setTree(t);
    setTraced(true);
  };

  const TreeNode = ({node, depth = 0, isLast = true}) => {
    if (!node) return null;
    const isRevogado = node.status === "revogado";
    const hasChildren = node.children && node.children.length > 0;
    return <div style={{marginLeft: depth > 0 ? 24 : 0, position: "relative"}}>
      {depth > 0 && <div style={{position:"absolute",left:-16,top:0,width:12,height:20,borderLeft:"2px solid var(--gold)",borderBottom:"2px solid var(--gold)",borderRadius:"0 0 0 6px"}}/>}
      <div className="cd" style={{padding:"12px 16px",marginBottom:8,borderColor:isRevogado?"#e74c3c":"var(--gold)",opacity:isRevogado?0.7:1,position:"relative"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
          <span style={{background:isRevogado?"#e74c3c":"var(--grad)",color:"#fff",padding:"2px 10px",borderRadius:12,fontSize:12,fontWeight:700}}>{node.id}</span>
          {isRevogado&&<span className="badge badge-revogado">REVOGADO</span>}
          {node.status==="vigente"&&<span className="badge badge-vigente">VIGENTE</span>}
        </div>
        <div style={{fontSize:13,lineHeight:1.6,whiteSpace:"pre-wrap",textDecoration:isRevogado?"line-through":"none"}}>{node.text}</div>
        {node.subs&&node.subs.length>0&&<div style={{marginTop:6,paddingTop:6,borderTop:"1px dashed var(--border)"}}>
          {node.subs.map((s,j)=><div key={j} style={{fontSize:12,lineHeight:1.5,color:"var(--text-sec)",paddingLeft:12,marginTop:2}}>
            <span style={{color:"var(--gold)",fontWeight:600,marginRight:4}}>{s.id}</span>{s.txt}
            {s.status==="revogado"&&<span className="badge badge-revogado" style={{marginLeft:4}}>REVOGADO</span>}
          </div>)}
        </div>}
        {node.alteracao&&<div style={{marginTop:4,padding:"2px 8px",background:"rgba(52,152,219,0.08)",borderLeft:"2px solid #3498db",borderRadius:3,fontSize:11,color:"#3498db"}}>↳ {node.alteracao}</div>}
        {isRevogado&&<div style={{marginTop:6,fontSize:11,color:"#e74c3c",fontStyle:"italic"}}>Dispositivo revogado — ramificações não seguidas.</div>}
        {node.refs.length > 0 && !isRevogado && <div style={{marginTop:6,fontSize:11,color:"var(--text-sec)"}}>Remissões internas: {node.refs.join(", ")}</div>}
      </div>
      {hasChildren && <div style={{paddingLeft:8}}>
        {node.children.map((child, i) => <TreeNode key={child?.id||i} node={child} depth={depth + 1} isLast={i === node.children.length - 1}/>)}
      </div>}
    </div>;
  };

  return <div style={{display:"flex",gap:16,height:"70vh"}}>
    <div style={{width:250,display:"flex",flexDirection:"column",gap:10}}>
      <div style={{fontSize:13,fontWeight:700,color:"var(--gold)"}}>TRAÇAR TEIA</div>
      <select value={startArt} onChange={e=>setStartArt(e.target.value)} style={{padding:"8px",borderRadius:6,fontSize:13}}>
        <option value="">Selecione o Artigo...</option>
        {arts.map(a=><option key={a} value={a}>{a}</option>)}
      </select>
      <button onClick={tracar} style={{padding:"10px",background:"var(--grad)",color:"#fff",border:"none",borderRadius:7,fontWeight:600,cursor:"pointer"}}>Traçar Teia</button>
      <div style={{fontSize:11,color:"var(--text-sec)",lineHeight:1.5}}>
        A teia segue <b>todas</b> as remissões internas (mesma lei) recursivamente, formando uma árvore.<br/><br/>
        Referências a outras leis são ignoradas.<br/>
        Dispositivos <span style={{color:"#e74c3c"}}>revogados</span> são sinalizados e não ramificam.<br/>
        Dispositivos vetados mostram apenas a versão vigente.
      </div>
    </div>
    <div style={{flex:1,overflow:"auto",padding:"10px",background:"var(--bg-hover)",borderRadius:12,border:"1px solid var(--border)"}}>
      {!traced ? <div style={{textAlign:"center",paddingTop:100,color:"var(--text-sec)"}}>Selecione um artigo para ver a teia de remissões internas.</div>
      : !tree ? <div style={{textAlign:"center",paddingTop:100}}>Artigo não encontrado ou sem dispositivo vigente.</div>
      : <TreeNode node={tree} depth={0}/>}
    </div>
  </div>;
}

function TabPrazos({ds}){const pv=useMemo(()=>extrairPrazosValores(ds),[ds]);return <div style={{maxHeight:"70vh",overflow:"auto"}}>{pv.length===0?<div style={{textAlign:"center",padding:40,color:"var(--text-sec)"}}>Nenhum prazo ou valor encontrado</div>:<table className="dt"><thead><tr><th>Tipo</th><th>Conteúdo</th><th>Artigo</th><th>Capítulo</th><th>Contexto</th></tr></thead><tbody>{pv.map((p,i)=><tr key={i}><td><span className="badge" style={{background:"var(--gold-subtle)",color:"var(--gold)"}}>{p.tipo}</span></td><td style={{fontWeight:600}}>{p.val}</td><td>{p.art}</td><td style={{fontSize:12}}>{p.cap}</td><td style={{fontSize:12}}>{p.ctx}</td></tr>)}</tbody></table>}</div>;}

function TabIndice({ds,area,onGoToArt}){
  const [filtro,setFiltro]=useState("");
  const [expandedIdx,setExpandedIdx]=useState(null);
  const idxPredefinido=useMemo(()=>buildIdx(ds,area),[ds,area]);
  const resultadosBusca=useMemo(()=>fullTextSearch(ds,filtro),[ds,filtro]);
  const totalOcorrencias=useMemo(()=>resultadosBusca.reduce((s,r)=>s+r.ocorrencias,0),[resultadosBusca]);
  const buscaAtiva=filtro.trim().length>=3;
  const ctx=useMemo(()=>hierarquia(ds),[ds]);

  const highlightText=(text,term)=>{
    if(!term||term.length<3||!text)return text;
    const re=new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`,"gi");
    const parts=text.split(re);
    return parts.map((p,i)=>re.test(p)?React.createElement("mark",{key:i,style:{background:"rgba(212,168,83,0.35)",padding:"0 1px",borderRadius:2}},p):p);
  };

  // Coleta todos os dispositivos de um artigo para o painel expandido
  const getArtigoDisps=(artId)=>{
    const result=[];let inside=false;
    for(const d of ds){
      if(d.tipo==="ARTIGO"&&d.id===artId){inside=true;result.push(d);continue;}
      if(inside){
        if(d.tipo==="ARTIGO"||DIV.has(d.tipo))break;
        result.push(d);
      }
    }
    return result;
  };

  return <div>
    <div style={{marginBottom:12}}>
      <input value={filtro} onChange={e=>{setFiltro(e.target.value);setExpandedIdx(null);}} placeholder="Buscar qualquer palavra (mínimo 3 caracteres)..." style={{width:"100%",maxWidth:"100%",background:"var(--bg-hover)",border:"1px solid var(--border)",borderRadius:6,padding:"10px 14px",fontSize:14,boxSizing:"border-box"}}/>
      {buscaAtiva&&<div style={{marginTop:6,fontSize:12,color:"var(--text-sec)"}}>{totalOcorrencias} ocorrência(s) em {resultadosBusca.length} dispositivo(s)</div>}
    </div>
    {buscaAtiva?
      (resultadosBusca.length===0?<div style={{textAlign:"center",padding:40,color:"var(--text-sec)"}}>Nenhum dispositivo encontrado para "{filtro}"</div>

function TabMapa({ds}){
  const [selArt,setSelArt]=useState(null);
  const [collapsed,setCollapsed]=useState({});

  const toggle=(key)=>setCollapsed(p=>({...p,[key]:!p[key]}));

  // Build map of article status (vigente/vetado/revogado) and full hierarchy
  const artStatusMap=useMemo(()=>{
    const m={};
    for(const d of ds){if(d.tipo==="ARTIGO")m[d.id]=d.status||"vigente";}
    return m;
  },[ds]);

  // Build hierarchical structure capturing ALL levels and ALL articles
  const estrutura=useMemo(()=>{
    const mapa=[];
    const stack={PARTE:null,LIVRO:null,"TÍTULO":null,"CAPÍTULO":null,"SEÇÃO":null,"SUBSEÇÃO":null};
    const levels=["PARTE","LIVRO","TÍTULO","CAPÍTULO","SEÇÃO","SUBSEÇÃO"];

    const clearBelow=(tipo)=>{
      const idx=levels.indexOf(tipo);
      for(let i=idx+1;i<levels.length;i++)stack[levels[i]]=null;
    };

    const getParent=(tipo)=>{
      const idx=levels.indexOf(tipo);
      for(let i=idx-1;i>=0;i--){if(stack[levels[i]])return stack[levels[i]];}
      return null;
    };

    for(const d of ds){
      if(DIV.has(d.tipo)){
        const node={tipo:d.tipo,id:d.id,rub:d.rub,children:[],artigos:[]};
        clearBelow(d.tipo);
        stack[d.tipo]=node;
        const parent=getParent(d.tipo);
        if(parent){parent.children.push(node);}
        else{mapa.push(node);}
      }else if(d.tipo==="ARTIGO"){
        // Find deepest active division to attach article to
        let target=null;
        for(let i=levels.length-1;i>=0;i--){if(stack[levels[i]]){target=stack[levels[i]];break;}}
        const artEntry={id:d.id,status:d.status||"vigente"};
        if(target){target.artigos.push(artEntry);}
        // Articles outside any division are rare, but handle gracefully
      }
    }
    return mapa;
  },[ds]);

  // Get full article content + sub-devices for the detail panel
  const artDetail=useMemo(()=>{
    if(!selArt)return null;
    const result=[];let inside=false;
    for(const d of ds){
      if(d.tipo==="ARTIGO"&&d.id===selArt){
        inside=true;result.push(d);continue;
      }
      if(inside){
        if(d.tipo==="ARTIGO"||DIV.has(d.tipo))break;
        result.push(d);
      }
    }
    return result.length>0?result:null;
  },[ds,selArt]);

  // Compute the hierarchy path for the selected article
  const artPath=useMemo(()=>{
    if(!selArt)return"";
    const ctx=hierarquia(ds);
    return ctx[selArt]||"";
  },[ds,selArt]);

  // Render article badges
  const renderArtigos=(artigos,pathKey)=>{
    if(!artigos||artigos.length===0)return null;
    return <div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:4,marginLeft:4}}>
      {artigos.map((a,i)=>{
        const isRev=a.status==="revogado";
        const isVet=a.status==="vetado";
        const isInativo=isRev||isVet;
        const isSel=selArt===a.id;
        return <span key={pathKey+"-"+i}
          onClick={(e)=>{e.stopPropagation();setSelArt(a.id);}}
          style={{
            background:isSel?"var(--gold)":isInativo?"rgba(231,76,60,0.15)":"var(--gold-subtle)",
            color:isSel?"#fff":isInativo?"#e74c3c":"var(--gold)",
            padding:"2px 7px",borderRadius:4,fontSize:11,cursor:"pointer",
            textDecoration:isInativo?"line-through":"none",
            fontWeight:isSel?700:400,
            transition:"all .12s",
            border:isSel?"1px solid var(--gold)":"1px solid transparent"
          }}
          title={isRev?"Revogado":isVet?"Vetado":"Vigente"}
        >{a.id}</span>;
      })}
    </div>;
  };

  // Recursive render for any hierarchy level
  const renderNode=(node,depth,pathKey)=>{
    const key=pathKey+"-"+node.id;
    const isOpen=!collapsed[key];
    const hasContent=(node.children&&node.children.length>0)||(node.artigos&&node.artigos.length>0);

    // Color/style by level type
    const levelStyle={
      "PARTE":{bg:"var(--grad)",color:"#fff",fontWeight:700,fontSize:14,borderRadius:8,padding:"10px 14px"},
      "LIVRO":{bg:"var(--gold)",color:"#fff",fontWeight:700,fontSize:13,borderRadius:7,padding:"8px 12px"},
      "TÍTULO":{bg:"var(--gold-subtle)",color:"var(--gold)",fontWeight:600,fontSize:13,borderRadius:6,padding:"7px 12px"},
      "CAPÍTULO":{bg:"var(--bg-hover)",color:"var(--text)",fontWeight:600,fontSize:12,borderRadius:6,padding:"6px 10px"},
      "SEÇÃO":{bg:"transparent",color:"var(--text-sec)",fontWeight:500,fontSize:12,borderRadius:4,padding:"4px 10px"},
      "SUBSEÇÃO":{bg:"transparent",color:"var(--text-mute)",fontWeight:400,fontSize:11,borderRadius:4,padding:"4px 10px"}
    };
    const st=levelStyle[node.tipo]||levelStyle["SEÇÃO"];
    const indent=depth*12;

    return <div key={key} style={{marginLeft:indent,marginTop:depth===0?8:4}}>
      <div
        onClick={()=>{if(hasContent)toggle(key);}}
        style={{background:st.bg,color:st.color,fontWeight:st.fontWeight,fontSize:st.fontSize,borderRadius:st.borderRadius,padding:st.padding,cursor:hasContent?"pointer":"default",display:"flex",alignItems:"center",gap:6,border:node.tipo==="CAPÍTULO"||node.tipo==="SEÇÃO"?"1px solid var(--border)":"none",transition:"opacity .12s",userSelect:"none"}}
      >
        {hasContent&&<span style={{fontSize:10,opacity:.7,flexShrink:0,transition:"transform .15s",transform:isOpen?"rotate(90deg)":"rotate(0deg)"}}>▶</span>}
        <span style={{fontFamily:"'Segoe UI',sans-serif"}}>{node.tipo} — </span>
        <b>{node.id}</b>
        {node.rub&&<span style={{opacity:.8,marginLeft:4}}>— {node.rub}</span>}
        {node.artigos&&node.artigos.length>0&&<span style={{marginLeft:"auto",fontSize:10,opacity:.6,flexShrink:0}}>{node.artigos.length} art.</span>}
      </div>
      {isOpen&&<div>
        {renderArtigos(node.artigos,key)}
        {node.children&&node.children.map((child,i)=>renderNode(child,depth+1,key+"-"+i))}
      </div>}
    </div>;
  };

  return <div style={{display:"flex",gap:16,height:"70vh"}}>
    {/* Painel esquerdo: árvore hierárquica */}
    <div style={{flex:"1 1 55%",overflow:"auto",paddingRight:8}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--gold)"}}>ESTRUTURA HIERÁRQUICA</div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>setCollapsed({})} style={{fontSize:11,padding:"3px 8px",background:"var(--bg-hover)",border:"1px solid var(--border)",borderRadius:4,cursor:"pointer",color:"var(--text-sec)"}}>Expandir tudo</button>
          <button onClick={()=>{
            const all={};
            const markAll=(nodes,prefix)=>{
              nodes.forEach((n,i)=>{
                const k=prefix+"-"+n.id;
                const hasContent=(n.children&&n.children.length>0)||(n.artigos&&n.artigos.length>0);
                if(hasContent)all[k]=true;
                if(n.children)markAll(n.children,k+"-"+i);
              });
            };
            markAll(estrutura,"root");
            setCollapsed(all);
          }} style={{fontSize:11,padding:"3px 8px",background:"var(--bg-hover)",border:"1px solid var(--border)",borderRadius:4,cursor:"pointer",color:"var(--text-sec)"}}>Colapsar tudo</button>
        </div>
      </div>
      <div style={{fontSize:11,color:"var(--text-mute)",marginBottom:6,display:"flex",gap:12}}>
        <span>● <span style={{color:"var(--gold)"}}>Vigente</span></span>
        <span>● <span style={{color:"#e74c3c"}}>Revogado/Vetado</span></span>
        <span style={{marginLeft:"auto",fontStyle:"italic"}}>Clique no artigo para ver o conteúdo →</span>
      </div>
      {estrutura.length===0?<div style={{textAlign:"center",padding:40,color:"var(--text-sec)"}}>Nenhuma estrutura hierárquica encontrada</div>
      :estrutura.map((node,i)=>renderNode(node,0,"root"))}
    </div>
    {/* Painel direito: conteúdo do artigo selecionado */}
    <div style={{flex:"0 0 40%",minWidth:300,overflow:"auto",background:"var(--bg-hover)",borderRadius:12,border:"1px solid var(--border)",padding:16}}>
      {!selArt?<div style={{textAlign:"center",paddingTop:80,color:"var(--text-sec)"}}>
        <div style={{fontSize:28,marginBottom:12}}>📑</div>
        <div style={{fontSize:14}}>Selecione um artigo no mapa para visualizar seu conteúdo.</div>
      </div>
      :!artDetail?<div style={{textAlign:"center",paddingTop:80,color:"var(--text-sec)"}}>Artigo não encontrado nos dispositivos.</div>
      :<div className="fade">
        {artPath&&<div style={{fontSize:11,color:"var(--text-sec)",marginBottom:8,fontStyle:"italic",lineHeight:1.5}}>{artPath}</div>}
        {artDetail.map((d,i)=>{
          const isArt=d.tipo==="ARTIGO";
          const isRev=d.status==="revogado";
          const isVet=d.status==="vetado";
          const isInativo=isRev||isVet;
          return <div key={i} style={{marginBottom:isArt?8:2,paddingLeft:isArt?0:16,opacity:isInativo?0.6:1}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
              <span style={{color:isInativo?"#e74c3c":"var(--gold)",fontWeight:700,fontSize:isArt?14:12}}>{d.id}</span>
              {isArt&&<span className={isInativo?"badge badge-revogado":"badge badge-vigente"}>{isVet?"VETADO":isRev?"REVOGADO":"VIGENTE"}</span>}
              {!isArt&&isInativo&&<span className="badge badge-revogado" style={{fontSize:9}}>{isVet?"VETADO":"REVOGADO"}</span>}
            </div>
            <div style={{fontSize:isArt?13:12,lineHeight:1.6,textDecoration:isInativo?"line-through":"none",color:"var(--text)"}}>
              {d.rub&&<i style={{color:"var(--text-sec)"}}>{d.rub} </i>}
              {d.txt}
            </div>
            {d.alteracao&&<div style={{marginTop:2,padding:"2px 8px",background:"rgba(52,152,219,0.08)",borderLeft:"2px solid #3498db",borderRadius:3,fontSize:11,color:"#3498db",textDecoration:"none"}}>↳ {d.alteracao}</div>}
          </div>;
        })}
      </div>}
    </div>
  </div>;
}

function TabSabatina({lei,area,apiKey,saveKey}){
  const [perguntas,setPerguntas]=useState(()=>LS("t3-sab-"+lei.id)||[]);
  const [respostas,setRespostas]=useState(()=>LS("t3-sab-r-"+lei.id)||{});
  const [correcoes,setCorrecoes]=useState(()=>LS("t3-sab-c-"+lei.id)||{});
  const [loading,setLoading]=useState({});
  const [uploading,setUploading]=useState(false);
  const [localKey,setLocalKey]=useState(apiKey);
  const fRef=useRef(null);

  const salvarRespostas=(novas)=>{setRespostas(novas);LS("t3-sab-r-"+lei.id,novas);};
  const salvarCorrecoes=(novas)=>{setCorrecoes(novas);LS("t3-sab-c-"+lei.id,novas);};

  const uploadDocx=async(e)=>{
    const f=e.target.files?.[0];if(!f)return;
    setUploading(true);
    try{
      const ab=await f.arrayBuffer();
      const result=await mammoth.extractRawText({arrayBuffer:ab});
      const text=result.value||"";
      // Extrai perguntas numeradas (1. Pergunta... 2. Pergunta... etc)
      const lines=text.split("\n").map(l=>l.trim()).filter(Boolean);
      const qs=[];let current="";
      for(const line of lines){
        const match=line.match(/^(\d+)\s*[\.\)\-]\s*(.+)/);
        if(match){
          if(current)qs.push(current);
          current=match[2].trim();
        }else if(current){
          current+=" "+line;
        }
      }
      if(current)qs.push(current);
      if(qs.length>0){
        setPerguntas(qs);LS("t3-sab-"+lei.id,qs);
        setRespostas({});LS("t3-sab-r-"+lei.id,{});
        setCorrecoes({});LS("t3-sab-c-"+lei.id,{});
      }else{alert("Não foram encontradas perguntas numeradas no documento. Use o formato: 1. Pergunta\\n2. Pergunta...");}
    }catch(e){alert("Erro ao processar .docx: "+e.message);}
    setUploading(false);
    if(fRef.current)fRef.current.value="";
  };

  const corrigir=async(idx)=>{
    if(!apiKey){alert("Configure a API Key primeiro.");return;}
    const pergunta=perguntas[idx];
    const resposta=respostas[idx]||"";
    if(!resposta.trim()){alert("Escreva sua resposta antes de solicitar a correção.");return;}
    setLoading(p=>({...p,[idx]:true}));
    try{
      // Coleta contexto relevante da lei (artigos com termos-chave da pergunta)
      const termos=pergunta.toLowerCase().split(/\s+/).filter(t=>t.length>3);
      const artigosRelevantes=lei.ds.filter(d=>{
        if(d.status==="vetado")return false;
        const txt=((d.txt||"")+" "+(d.id||"")+" "+(d.rub||"")).toLowerCase();
        return termos.some(t=>txt.includes(t));
      }).slice(0,30).map(d=>`[${d.tipo} ${d.id}] ${d.txt}`).join("\n");

      const systemPrompt=`Você é um professor jurídico tributário especialista em ${AREAS[area]?.nome}, atuando como examinador oral rigoroso mas justo.
Sua função é corrigir a resposta do aluno com base EXCLUSIVAMENTE na lei "${lei.nome}".

CONTEXTO DA LEI (dispositivos relevantes):
${artigosRelevantes || "(Nenhum dispositivo relevante encontrado — use seu conhecimento da lei)"}

REGRAS DE CORREÇÃO:
1. Analise se a resposta está CORRETA, PARCIALMENTE CORRETA ou INCORRETA
2. Aponte o que está certo e o que precisa ser melhorado
3. SEMPRE cite a base legal específica (artigo, parágrafo, inciso) da lei "${lei.nome}"
4. Se a resposta estiver incompleta, indique o que faltou com a referência legal
5. Seja técnico mas didático — como um professor em banca de exame oral
6. Responda em português brasileiro`;

      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2048,system:systemPrompt,messages:[{role:"user",content:`PERGUNTA DA SABATINA:\n${pergunta}\n\nRESPOSTA DO ALUNO:\n${resposta}\n\nCorrija a resposta acima com base legal específica na lei "${lei.nome}".`}]})});
      const d=await r.json();
      const texto=d.content?.[0]?.text||"Erro na correção.";
      const novas={...correcoes,[idx]:texto};
      salvarCorrecoes(novas);
    }catch(e){
      const novas={...correcoes,[idx]:"Erro: "+e.message};
      salvarCorrecoes(novas);
    }
    setLoading(p=>({...p,[idx]:false}));
  };

  const limparTudo=()=>{if(confirm("Limpar todas as perguntas, respostas e correções desta sabatina?")){
    setPerguntas([]);setRespostas({});setCorrecoes({});
    LS("t3-sab-"+lei.id,null);LS("t3-sab-r-"+lei.id,null);LS("t3-sab-c-"+lei.id,null);
  }};

  if(!apiKey)return <div className="cd" style={{padding:20}}><div style={{fontWeight:700,marginBottom:10}}>Configurar API Key para Correção IA</div><input value={localKey} onChange={e=>setLocalKey(e.target.value)} placeholder="sk-ant-..." style={{width:"100%",padding:10,marginBottom:10,borderRadius:6}}/><button onClick={()=>saveKey(localKey)} className="btn-primary">Salvar</button></div>;

  return <div className="fade">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
      <div>
        <h3 style={{margin:0,fontSize:16}}>Sabatina — {lei.nome}</h3>
        <div style={{fontSize:12,color:"var(--text-sec)",marginTop:2}}>{perguntas.length} pergunta(s) carregada(s)</div>
      </div>
      <div style={{display:"flex",gap:6}}>
        <label style={{display:"inline-flex",alignItems:"center",gap:5,padding:"7px 14px",background:"var(--grad)",color:"#fff",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:600}}>
          {uploading?<><Sp/> Processando...</>:<><Ic d={IC.up} s={13} c="#fff"/> Carregar .docx</>}
          <input ref={fRef} type="file" accept=".docx" onChange={uploadDocx} style={{display:"none"}}/>
        </label>
        {perguntas.length>0&&<button onClick={limparTudo} className="btn-secondary" style={{fontSize:12,padding:"7px 12px",color:"var(--err)"}}>Limpar</button>}
      </div>
    </div>

    {perguntas.length===0?
      <div style={{textAlign:"center",padding:40,color:"var(--text-sec)"}}>
        <div style={{fontSize:48,marginBottom:12}}>📝</div>
        <div style={{fontSize:16,marginBottom:8}}>Nenhuma sabatina carregada</div>
        <div style={{fontSize:13,lineHeight:1.6}}>Faça upload de um arquivo .docx com perguntas numeradas.<br/>Formato esperado:<br/><code style={{background:"var(--bg-hover)",padding:"2px 6px",borderRadius:3}}>1. Pergunta um?<br/>2. Pergunta dois?</code></div>
      </div>
    :<div style={{display:"flex",flexDirection:"column",gap:16,maxHeight:"68vh",overflow:"auto",paddingRight:8}}>
      {perguntas.map((p,idx)=><div key={idx} className="cd" style={{padding:16}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:10}}>
          <span style={{background:"var(--grad)",color:"#fff",minWidth:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:700,flexShrink:0}}>{idx+1}</span>
          <div style={{fontSize:14,fontWeight:600,lineHeight:1.5,flex:1}}>{p}</div>
        </div>
        <textarea
          value={respostas[idx]||""}
          onChange={e=>{const novas={...respostas,[idx]:e.target.value};salvarRespostas(novas);}}
          placeholder="Escreva sua resposta aqui..."
          style={{width:"100%",minHeight:100,background:"var(--input-bg)",border:"1px solid var(--border)",borderRadius:8,padding:"10px 12px",fontSize:13,lineHeight:1.6,resize:"vertical",fontFamily:"inherit",boxSizing:"border-box"}}
        />
        <div style={{display:"flex",justifyContent:"flex-end",marginTop:8}}>
          <button onClick={()=>corrigir(idx)} disabled={loading[idx]} style={{padding:"8px 16px",background:loading[idx]?"var(--bg-hover)":"var(--grad)",color:loading[idx]?"var(--text-sec)":"#fff",border:"none",borderRadius:6,fontSize:13,fontWeight:600,cursor:loading[idx]?"not-allowed":"pointer",display:"flex",alignItems:"center",gap:6}}>
            {loading[idx]?<><Sp/> Corrigindo...</>:"✏️ Corrigir com IA"}
          </button>
        </div>
        {correcoes[idx]&&<div style={{marginTop:10,padding:"12px 16px",background:"var(--bg-hover)",borderRadius:8,borderLeft:"3px solid var(--gold)",fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap"}}>
          <div style={{fontWeight:700,color:"var(--gold)",marginBottom:6,fontSize:12}}>CORREÇÃO DO PROFESSOR IA</div>
          {correcoes[idx]}
        </div>}
      </div>)}
    </div>}
  </div>;
}

// ═══ REFORMA ═══
const REFORMA=[
  {n:"EC 132/2023",d:"Emenda Constitucional da Reforma Tributária. Institui IBS, CBS e Imposto Seletivo em substituição a PIS, COFINS, IPI, ICMS e ISS. Período de transição: 2026-2033.",url:"https://www.planalto.gov.br/ccivil_03/constituicao/emendas/emc/emc132.htm"},
  {n:"LC 214/2025",d:"Lei Complementar que regulamenta o IBS, a CBS e o Imposto Seletivo. Detalha regras de incidência, base de cálculo, alíquotas, créditos, regimes específicos e o split payment.",url:"https://www.planalto.gov.br/ccivil_03/leis/lcp/Lcp214.htm"},
  {n:"LC 227/2026 (prevista)",d:"Complementação normativa da Reforma. Regulamentação adicional do Comitê Gestor do IBS e procedimentos de transição.",url:""},
  {n:"IN RFB nº 2.121/2022",d:"Instrução Normativa que consolida a legislação de PIS/COFINS. Vigente durante o período de transição até a plena implementação da CBS.",url:"https://normasinternet2.receita.fazenda.gov.br/#/consulta/externa/127905"},
  {n:"Lei nº 10.637/2002",d:"PIS não cumulativo. Regime vigente durante a transição, com redução gradual de alíquotas a partir de 2027.",url:"https://www.planalto.gov.br/ccivil_03/leis/2002/l10637.htm"},
  {n:"Lei nº 10.833/2003",d:"COFINS não cumulativa. Regime vigente durante a transição, com redução gradual de alíquotas a partir de 2027.",url:"https://www.planalto.gov.br/ccivil_03/leis/2003/l10.833.htm"},
  {n:"Lei nº 9.718/1998",d:"PIS/COFINS cumulativo. Regime vigente durante a transição para os contribuintes não sujeitos à não cumulatividade.",url:"https://www.planalto.gov.br/ccivil_03/leis/l9718.htm"},
];
function Ref({apiKey,saveKey}){const [sub,setSub]=useState("leg");const [tMsgs,setTMsgs]=useState([]);const [tInp,setTInp]=useState("");const [tLd,setTLd]=useState(false);const [localKey,setLocalKey]=useState(apiKey);const cr=useRef(null);const subs=[{id:"leg",lb:"Legislação"},{id:"timeline",lb:"Timeline Transição"},{id:"tutor",lb:"Tutor Reforma"}];
  const TIMELINE=[{ano:"2023",ev:"EC 132/2023 promulgada",det:"Aprovação da Emenda Constitucional da Reforma Tributária.",fonte:"Planalto",url:"https://www.planalto.gov.br/ccivil_03/constituicao/emendas/emc/emc132.htm"},{ano:"2025",ev:"LC 214/2025 publicada",det:"Regulamentação do IBS, CBS e Imposto Seletivo.",fonte:"Planalto",url:"https://www.planalto.gov.br/ccivil_03/leis/lcp/Lcp214.htm"},{ano:"2026",ev:"Início do período de teste",det:"CBS a 0,9% e IBS a 0,1% (alíquota-teste). PIS/COFINS mantidos integralmente.",fonte:"EC 132/2023, art. 125"},{ano:"2027",ev:"CBS substituindo PIS/COFINS",det:"CBS em vigor com alíquota de referência. PIS e COFINS extintos.",fonte:"EC 132/2023, art. 125, §1º"},{ano:"2029-2032",ev:"Transição gradual ICMS/ISS → IBS",det:"Redução progressiva de ICMS e ISS: 90% em 2029, 80% em 2030, 70% em 2031, 60% em 2032.",fonte:"EC 132/2023, art. 125, §§3º-5º"},{ano:"2033",ev:"Plena vigência",det:"IBS em alíquota plena. ICMS e ISS extintos. Sistema dual CBS+IBS consolidado.",fonte:"EC 132/2023, art. 125, §6º"}];
  const sendT=async()=>{if(!tInp.trim()||tLd||!apiKey)return;const m=tInp.trim();setTInp("");setTMsgs(p=>[...p,{role:"user",text:m}]);setTLd(true);try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1024,system:"Você é o TERA Tutor especialista em Reforma Tributária brasileira (EC 132/2023, LC 214/2025). Responda sobre IBS, CBS, Imposto Seletivo, split payment, não cumulatividade, transição, cashback.",messages:[{role:"user",content:m}]})});const d=await r.json();setTMsgs(p=>[...p,{role:"assistant",text:d.content?.[0]?.text||"Erro."}]);}catch(e){setTMsgs(p=>[...p,{role:"assistant",text:"Erro: "+e.message}]);}setTLd(false);};
  useEffect(()=>{cr.current&&(cr.current.scrollTop=cr.current.scrollHeight);},[tMsgs]);
  return <div className="fade"><h2 style={{fontSize:20,fontWeight:700,marginBottom:12}}>Reforma Tributária</h2>
    <div style={{display:"flex",gap:0,borderBottom:"1px solid var(--border)",marginBottom:14}}>{subs.map(s=><button key={s.id} className={`stab ${sub===s.id?"on":""}`} onClick={()=>setSub(s.id)}>{s.lb}</button>)}</div>
    {sub==="leg"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>{REFORMA.map((r,i)=><div key={i} className="cd" style={{padding:14,cursor:r.url?"pointer":"default"}} onClick={()=>{if(r.url)window.open(r.url,"_blank");}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><b>{r.n}</b>{r.url&&<span style={{fontSize:11,color:"var(--gold)",display:"flex",alignItems:"center",gap:3}}><Ic d={IC.lk} s={11} c="var(--gold)"/>Abrir</span>}</div><p style={{fontSize:13,color:"var(--text-sec)",marginTop:4}}>{r.d}</p></div>)}</div>}
    {sub==="timeline"&&<div>
      <div style={{background:"var(--gold-subtle)",border:"1px solid var(--gold)",borderRadius:8,padding:"10px 14px",marginBottom:16,fontSize:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>Fontes: EC 132/2023, LC 214/2025 — Dados extraídos da legislação vigente publicada no Planalto.</span>
        <a href="https://www.planalto.gov.br/ccivil_03/constituicao/emendas/emc/emc132.htm" target="_blank" style={{fontSize:11,color:"var(--gold)",whiteSpace:"nowrap",marginLeft:8}}>Verificar fonte</a>
      </div>
      <div style={{position:"relative",paddingLeft:30}}>{TIMELINE.map((t,i)=><div key={i} style={{position:"relative",marginBottom:20,paddingLeft:20}}>
      <div style={{position:"absolute",left:-30,top:0,width:20,height:20,borderRadius:"50%",background:"var(--grad)",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:8,height:8,borderRadius:"50%",background:"#fff"}}></div></div>
      {i<TIMELINE.length-1&&<div style={{position:"absolute",left:-21,top:20,width:2,height:"calc(100% + 4px)",background:"var(--border)"}}></div>}
      <div className="cd" style={{padding:14,cursor:t.url?"pointer":"default"}} onClick={()=>{if(t.url)window.open(t.url,"_blank");}}>
        <div style={{fontWeight:700,color:"var(--gold)",fontSize:15}}>{t.ano}</div>
        <div style={{fontWeight:600,marginTop:4}}>{t.ev}</div>
        <div style={{fontSize:13,color:"var(--text-sec)",marginTop:4}}>{t.det}</div>
        <div style={{fontSize:11,color:"var(--text-mute)",marginTop:6,fontStyle:"italic"}}>Fonte: {t.fonte}{t.url&&<> · <a href={t.url} target="_blank" onClick={e=>e.stopPropagation()} style={{color:"var(--gold)"}}>ver legislação</a></>}</div>
      </div>
    </div>)}</div></div>}
    {sub==="tutor"&&(!apiKey?<div className="cd" style={{padding:20}}><div style={{fontWeight:700,marginBottom:10}}>Configurar API Key</div><input value={localKey} onChange={e=>setLocalKey(e.target.value)} placeholder="sk-ant-..." style={{width:"100%",padding:10,marginBottom:10,borderRadius:6}}/><button onClick={()=>saveKey(localKey)} className="btn-primary">Salvar</button></div>
    :<div style={{display:"flex",flexDirection:"column",height:"60vh"}}>
      <div ref={cr} style={{flex:1,overflowY:"auto",padding:10}}>{tMsgs.length===0&&<div style={{textAlign:"center",padding:40,color:"var(--text-sec)"}}>Pergunte sobre a Reforma Tributária, IBS, CBS, Imposto Seletivo...</div>}{tMsgs.map((m,i)=><div key={i} style={{marginBottom:10,textAlign:m.role==="user"?"right":"left"}}><div style={{display:"inline-block",padding:10,borderRadius:10,maxWidth:"80%",background:m.role==="user"?"var(--grad)":"var(--bg-hover)",color:m.role==="user"?"#fff":"var(--text)",whiteSpace:"pre-wrap"}}>{m.text}</div></div>)}</div>
      <div style={{display:"flex",gap:10}}><input value={tInp} onChange={e=>setTInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendT()} placeholder="Pergunte sobre a Reforma..." style={{flex:1,padding:10,borderRadius:6}}/><button onClick={sendT} className="btn-primary" disabled={tLd}>{tLd?<Sp/>:"Enviar"}</button></div>
    </div>)}
  </div>;
}

// ═══ ATUALIZAÇÕES ═══
const PORTAIS=[
  {id:"rfb",nome:"RFB Reforma",cor:"#2e86ab"},
  {id:"nfe",nome:"NFe/NFCe",cor:"#27ae60"},
  {id:"dou",nome:"Diário Oficial",cor:"#d4a017"}
];
const DATA_URL="data/atualizacoes.json";

function Atl({apiKey,saveKey}){
  const [itens,setItens]=useState(()=>LS("t3-upd-v2")||[]);
  const [ultimaAtt,setUltimaAtt]=useState(()=>LS("t3-upd-dt")||"");
  const [ld,setLd]=useState(false);
  const [filtro,setFiltro]=useState("");
  const [filtroPortal,setFiltroPortal]=useState("");
  const [filtroData,setFiltroData]=useState("");
  const [erro,setErro]=useState("");
  const [sucesso,setSucesso]=useState("");

  const buscar=async()=>{setLd(true);setErro("");setSucesso("");
    try{
      const r=await fetch(DATA_URL+"?t="+Date.now());
      if(!r.ok)throw new Error("Arquivo de atualizações não encontrado ("+r.status+"). Verifique se o workflow do GitHub Actions foi executado e se o arquivo data/atualizacoes.json existe no repositório.");
      const data=await r.json();
      if(data.itens&&Array.isArray(data.itens)){
        if(data.itens.length===0){
          setSucesso("Busca concluída — o servidor retornou 0 itens. O script Python pode não estar encontrando publicações nas fontes (sites governamentais podem ter alterado a estrutura). Verifique os logs do GitHub Actions.");
          setUltimaAtt(data.ultima_atualizacao||new Date().toISOString());
          LS("t3-upd-dt",data.ultima_atualizacao||new Date().toISOString());
        }else{
          const linksExist=new Set(itens.map(i=>i.link));
          const novos=data.itens.filter(i=>!linksExist.has(i.link));
          const merged=[...novos,...itens].sort((a,b)=>b.data.localeCompare(a.data));
          setItens(merged);LS("t3-upd-v2",merged);
          setUltimaAtt(data.ultima_atualizacao||new Date().toISOString());
          LS("t3-upd-dt",data.ultima_atualizacao||new Date().toISOString());
          setSucesso("Busca concluída — "+novos.length+" novo(s) item(ns) adicionado(s). Total: "+merged.length+" itens.");
        }
      }else{setErro("Formato de dados inesperado no arquivo JSON.");}
    }catch(e){setErro(e.message);}setLd(false);};

  const exportar=()=>{try{
    const data={ultima_atualizacao:ultimaAtt,itens:itensFiltrados,exportDate:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");
    a.href=url;a.download="TERA_atualizacoes_"+new Date().toISOString().slice(0,10)+".json";
    a.click();URL.revokeObjectURL(url);
  }catch(e){alert("Erro ao exportar: "+e.message);}};

  const limpar=()=>{if(confirm("Tem certeza que deseja limpar todo o histórico de atualizações?")){setItens([]);setUltimaAtt("");LS("t3-upd-v2",null);LS("t3-upd-dt",null);}};

  const itensFiltrados=useMemo(()=>{
    let f=itens;
    if(filtroPortal)f=f.filter(i=>i.portal===filtroPortal);
    if(filtroData)f=f.filter(i=>i.data===filtroData);
    if(filtro.trim()){const term=filtro.toLowerCase();f=f.filter(i=>(i.titulo||"").toLowerCase().includes(term)||(i.resumo||"").toLowerCase().includes(term)||(i.portal||"").toLowerCase().includes(term));}
    return f;
  },[itens,filtroPortal,filtroData,filtro]);

  const datasUnicas=useMemo(()=>[...new Set(itens.map(i=>i.data))].sort().reverse(),[itens]);
  const portalCor=(portal)=>PORTAIS.find(p=>p.nome===portal||p.id===portal)?.cor||"var(--text-sec)";

  return <div className="fade">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
      <div><h2 style={{margin:0}}>Atualizações</h2>
        {ultimaAtt&&<div style={{fontSize:11,color:"var(--text-sec)",marginTop:2}}>Última atualização do servidor: {new Date(ultimaAtt).toLocaleString("pt-BR")}</div>}
        <div style={{fontSize:11,color:"var(--text-mute)",marginTop:1}}>Atualização automática: seg-sex às 09:00 (GitHub Actions)</div>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        <button onClick={buscar} className="btn-primary" disabled={ld}>{ld?<><Sp/> Buscando...</>:"Buscar Agora"}</button>
        {itens.length>0&&<><button onClick={exportar} className="btn-secondary" style={{fontSize:12,padding:"8px 12px"}}>Exportar</button>
        <button onClick={limpar} className="btn-secondary" style={{fontSize:12,padding:"8px 12px",color:"var(--err)"}}>Limpar Histórico</button></>}
      </div>
    </div>
    {erro&&<div style={{background:"rgba(231,76,60,0.1)",border:"1px solid #e74c3c",borderRadius:8,padding:"10px 14px",marginBottom:10,fontSize:13,color:"#e74c3c"}}>{erro}</div>}
    {sucesso&&<div style={{background:"rgba(46,204,113,0.1)",border:"1px solid #2ecc71",borderRadius:8,padding:"10px 14px",marginBottom:10,fontSize:13,color:"#2ecc71"}}>{sucesso}</div>}
    {itens.length>0&&<div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
      <input value={filtro} onChange={e=>setFiltro(e.target.value)} placeholder="Filtrar por nome ou texto..." style={{flex:"1 1 200px",padding:"8px 12px",borderRadius:6,fontSize:13,background:"var(--bg-hover)",border:"1px solid var(--border)"}}/>
      <select value={filtroPortal} onChange={e=>setFiltroPortal(e.target.value)} style={{padding:"8px",borderRadius:6,fontSize:12}}>
        <option value="">Todos os portais</option>
        {PORTAIS.map(p=><option key={p.id} value={p.nome}>{p.nome}</option>)}
      </select>
      <select value={filtroData} onChange={e=>setFiltroData(e.target.value)} style={{padding:"8px",borderRadius:6,fontSize:12}}>
        <option value="">Todas as datas</option>
        {datasUnicas.map(d=><option key={d} value={d}>{d}</option>)}
      </select>
      <span style={{fontSize:12,color:"var(--text-sec)"}}>{itensFiltrados.length} de {itens.length}</span>
    </div>}
    {itens.length===0?<div style={{textAlign:"center",padding:40,color:"var(--text-sec)"}}>
      <div style={{fontSize:16,marginBottom:8}}>Nenhuma atualização carregada</div>
      <div style={{fontSize:13,lineHeight:1.6}}>Clique em "Buscar Agora" para carregar as atualizações do servidor.<br/>As atualizações são geradas automaticamente de seg-sex às 09:00 por um script Python no GitHub Actions que consulta:<br/>
        <a href="https://www.gov.br/receitafederal/pt-br/acesso-a-informacao/acoes-e-programas/programas-e-atividades/reforma-consumo/noticias" target="_blank">RFB Reforma</a> · <a href="https://www.nfe.fazenda.gov.br/portal/listaConteudo.aspx?tipoConteudo=04BIflQt1aY=" target="_blank">NFe</a> · <a href="https://in.gov.br/leiturajornal" target="_blank">DOU</a>
      </div>
    </div>
    :<div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:"65vh",overflow:"auto"}}>{itensFiltrados.map((item,i)=>
      <div key={i} className="cd" style={{padding:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
          <div>
            <span className="badge" style={{background:portalCor(item.portal)+"22",color:portalCor(item.portal),marginRight:8}}>{item.portal}</span>
            <span style={{fontSize:11,color:"var(--text-sec)"}}>{item.data}</span>
          </div>
          {item.link&&<a href={item.link} target="_blank" onClick={e=>e.stopPropagation()} style={{fontSize:11,color:"var(--gold)",display:"flex",alignItems:"center",gap:3,whiteSpace:"nowrap"}}><Ic d={IC.lk} s={10} c="var(--gold)"/>Abrir</a>}
        </div>
        <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>{item.titulo}</div>
        {item.resumo&&<div style={{fontSize:12,color:"var(--text-sec)",lineHeight:1.5}}>{item.resumo}</div>}
      </div>
    )}</div>}
  </div>;
}

ReactDOM.render(<ErrorBoundary><App/></ErrorBoundary>,document.getElementById("root"));
</script>
</body>
